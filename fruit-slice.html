<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>水果切切乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;height:100vh;height:100dvh;overflow:hidden;background:#1a0a2e;font-family:"Microsoft YaHei",sans-serif}
canvas{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}
#ui{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
#hud{position:absolute;top:0;left:0;right:0;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6) 0%,transparent 100%);
  padding-top:max(16px, env(safe-area-inset-top));}
.score-box{color:#fff;font-size:13px;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.score-box span{display:block;font-size:32px;font-weight:bold;color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,0.5);line-height:1.1}
.life-box{display:flex;flex-direction:column;align-items:center;gap:2px}
.life-box .label{font-size:12px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.life-box .hearts{font-size:22px;letter-spacing:2px;line-height:1}
#combo{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:52px;font-weight:900;color:#ff4757;
  text-shadow:0 0 24px rgba(255,71,87,0.9),0 0 48px rgba(255,71,87,0.5);opacity:0;pointer-events:none;
  transition:opacity 0.25s,transform 0.25s;white-space:nowrap}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);display:flex;
  flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;z-index:20;padding:20px}
#overlay.hidden{display:none}
.ov-title{font-size:clamp(28px,8vw,42px);font-weight:bold;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.6);margin-bottom:12px;text-align:center}
.ov-score{font-size:clamp(18px,5vw,24px);color:#fff;margin-bottom:28px;text-align:center}
.ov-best{font-size:14px;color:#aaa;margin-bottom:8px;text-align:center}
.ov-btn{padding:16px 48px;font-size:clamp(16px,4.5vw,20px);font-weight:bold;
  background:linear-gradient(to bottom,#ffd700,#ffaa00);color:#3d2000;border:none;border-radius:14px;
  cursor:pointer;box-shadow:0 6px 24px rgba(255,170,0,0.4);transition:transform 0.12s;margin-bottom:20px}
.ov-btn:active{transform:scale(0.94)}
.ov-hint{font-size:clamp(12px,3.5vw,15px);color:#888;margin-top:8px;text-align:center;line-height:1.8}
.blade-flash{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;
  background:radial-gradient(circle at var(--x,50%) var(--y,50%),rgba(255,255,255,0.35) 0%,transparent 60%);
  opacity:0;transition:opacity 0.08s;z-index:5}
.blade-flash.on{opacity:1}
#pauseBtn{position:absolute;top:max(16px, env(safe-area-inset-top));right:16px;
  background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:15px;
  padding:7px 14px;border-radius:10px;cursor:pointer;pointer-events:auto;backdrop-filter:blur(4px)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="blade-flash" id="bladeFlash"></div>
<div id="ui">
  <div class="score-box"><span id="score">0</span>得分</div>
  <div class="life-box"><div class="label">生命</div><div class="hearts" id="lives"></div></div>
</div>
<div id="combo"></div>
<button id="pauseBtn">II</button>
<div id="overlay">
  <div class="ov-title" id="ovTitle">水果切切乐</div>
  <div class="ov-score" id="ovScore"></div>
  <div class="ov-best" id="ovBest"></div>
  <button class="ov-btn" id="ovBtn">开始游戏</button>
  <div class="ov-hint" id="ovHint">手指滑动屏幕切水果<br>躲开炸弹<br>连击加分！</div>
</div>

<script>
(function(){
'use strict';

const C = document.getElementById('c');
const X = C.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

// ---- Fruit Types ----
const FT = [
  {e:'🍎',c:'#e74c3c',r:36,s:10,g:0.20},
  {e:'🍊',c:'#f39c12',r:38,s:10,g:0.18},
  {e:'🍋',c:'#f1c40f',r:32,s:15,g:0.22},
  {e:'🍇',c:'#9b59b6',r:30,s:15,g:0.24},
  {e:'🍉',r:44,s:20,g:0.16},
  {e:'🍓',c:'#e74c3c',r:30,s:20,g:0.23},
  {e:'🍑',c:'#ffab91',r:36,s:15,g:0.19},
  {e:'🥝',c:'#27ae60',r:34,s:15,g:0.21},
  {e:'🍐',c:'#a8e063',r:36,s:12,g:0.20},
  {e:'🥭',c:'#ff7043',r:40,s:18,g:0.17},
  {e:'💣',c:'#333',r:30,s:-30,g:0.28,b:1},
  {e:'⭐',c:'#ffd700',r:26,s:50,g:0.17,sr:1},
];

// ---- State ----
const ST = {
  score:0, lives:3, started:0, over:0, paused:0,
  combo:0, comboT:0, maxCombo:0,
  lvl:1, lvlT:0, diff:1,
  fruits:[], splashes:[], trails:[], pts:[],
  bg:[],
};
let spT = 0, shk = 0;

// ---- Background stars ----
(function initBg(){
  for(let i=0;i<60;i++) ST.bg.push({
    x:Math.random(),y:Math.random(),
    s:Math.random()*1.5+0.5,
    t:Math.random()*Math.PI*2
  });
})();

// ---- HUD ----
function hud(){
  document.getElementById('score').textContent = ST.score;
  let h='';
  for(let i=0;i<3;i++) h += i<ST.lives?'❤️':'🖤';
  document.getElementById('lives').textContent = h;
}
hud();

// ---- Spawn ----
function spawn(){
  const d = Math.min(ST.diff, 3.5);
  const x = W*(0.12+Math.random()*0.76);
  const vx = (Math.random()-0.5)*(5+d*1.5);
  const vy = -(11+Math.random()*6+d*2.2);
  const n = Math.random();
  let t;
  if(n<0.07) t=FT[10];      // bomb
  else if(n<0.10) t=FT[11]; // star
  else{
    const w=[3,3,2,2,2,2,2,2,2,2];
    let r=Math.random()*20, i=0;
    for(;i<10&&r>w[i];i++) r-=w[i];
    t=FT[i];
  }
  const r = t.r + Math.random()*7;
  ST.fruits.push({x,y:H+r+10,vx,vy,r,t,rot:0,rs:(Math.random()-0.5)*0.12});
}

// ---- Line-circle hit ----
function hit(x1,y1,x2,y2,cx,cy,cr){
  const dx=x2-x1,dy=y2-y1,fx=x1-cx,fy=y1-cy;
  const a=dx*dx+dy*dy;
  if(a<0.001) return (fx*fx+fy*fy)<=cr*cr;
  const b=2*(fx*dx+fy*dy);
  const c=fx*fx+fy*fy-cr*cr;
  let d=b*b-4*a*c;
  if(d<0) return 0;
  d=Math.sqrt(d);
  return (-b-d)/(2*a)>=0&&(-b-d)/(2*a)<=1||(-b+d)/(2*a)>=0&&(-b+d)/(2*a)<=1;
}

// ---- Slice ----
function slice(fi){
  const f=ST.fruits[fi];
  ST.fruits.splice(fi,1);
  const t=f.t;

  if(t.b){
    // Bomb
    ST.score=Math.max(0,ST.score+t.s);
    ST.lives=Math.max(0,ST.lives-1);
    ST.combo=0; shk=12;
    showC('💥 -30！');
    for(let i=0;i<24;i++){
      const a=Math.random()*Math.PI*2,sp=Math.random()*9+2;
      ST.pts.push({x:f.x,y:f.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,c:'#444',l:1,s:Math.random()*7+3});
    }
    hud();
    if(ST.lives<=0) gameOver();
    return;
  }

  // Score
  ST.combo++;
  const prevCombo = ST.combo;
  ST.comboT=90;
  let bonus=0;
  if(ST.combo>=3) bonus=Math.floor(t.s*0.5);
  if(ST.combo>=6) bonus=Math.floor(t.s*1.0);
  if(ST.combo>=12) bonus=Math.floor(t.s*2.0);
  if(ST.combo>=20) bonus=Math.floor(t.s*3.0);
  const total=t.s+bonus;
  ST.score+=total;
  if(ST.combo>=3) showC(ST.combo+' 连击！'+(bonus>0?' +'+bonus:''));
  hud();

  // Splash particles
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2,sp=Math.random()*10+3;
    ST.pts.push({x:f.x,y:f.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,c:t.c,l:1,s:Math.random()*5+2});
  }

  // Score popup
  ST.pts.push({x:f.x,y:f.y,vx:0,vy:-2.5,c:'#ffd700',l:1,tx:'+'+total});

  // Half fruit chunks
  const ang=Math.atan2(f.y-H*0.5,f.x-W*0.5);
  for(let s=0;s<2;s++){
    const a=ang+(s===0?Math.PI/2:Math.PI*1.5);
    ST.pts.push({
      x:f.x,y:f.y,vx:Math.cos(a)*5,vy:-3,
      c:t.c,l:1,s:f.r*0.65,ha:a,rt:0,rsp:(Math.random()-0.5)*0.25,hp:1
    });
  }
}

// ---- Combo display ----
let comboEl=document.getElementById('combo');
function showC(text){
  comboEl.textContent=text;
  comboEl.style.opacity='1';
  comboEl.style.transform='translate(-50%,-50%) scale(1.3)';
  clearTimeout(showC._t);
  showC._t=setTimeout(()=>{
    comboEl.style.opacity='0';
    comboEl.style.transform='translate(-50%,-50%) scale(0.7)';
  },700);
}

// ---- Game over ----
function gameOver(){
  ST.over=1;
  document.getElementById('ovTitle').textContent='游戏结束';
  document.getElementById('ovScore').textContent='得分：'+ST.score;
  document.getElementById('ovBest').textContent='最高连击：'+ST.maxCombo;
  document.getElementById('ovBtn').textContent='再玩一次';
  document.getElementById('ovHint').innerHTML='继续加油！';
  document.getElementById('overlay').classList.remove('hidden');
}

// ---- Start / reset ----
function start(){
  ST.score=0; ST.lives=3; ST.started=1; ST.over=0; ST.paused=0;
  ST.combo=0; ST.comboT=0; ST.maxCombo=0;
  ST.lvl=1; ST.lvlT=0; ST.diff=1;
  ST.fruits=[]; ST.splashes=[]; ST.trails=[]; ST.pts=[];
  spT=0; shk=0;
  hud();
  document.getElementById('overlay').classList.add('hidden');
}

// ---- Touch input ----
let lastX=0,lastY=0;
const blade=document.getElementById('bladeFlash');

function getXY(e){
  if(e.touches) return {x:e.touches[0].clientX,y:e.touches[0].clientY};
  return {x:e.clientX,y:e.clientY};
}

function onStart(e){
  if(ST.over||ST.paused||!ST.started) return;
  e.preventDefault();
  const p=getXY(e);
  lastX=p.x; lastY=p.y;
  blade.style.setProperty('--x',p.x+'px');
  blade.style.setProperty('--y',p.y+'px');
  blade.classList.add('on');
}

function onMove(e){
  if(ST.over||ST.paused||!ST.started) return;
  e.preventDefault();
  const p=getXY(e);
  if(!lastX && !lastY){ lastX=p.x; lastY=p.y; return; }

  const dx=p.x-lastX,dy=p.y-lastY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>4){
    blade.style.setProperty('--x',p.x+'px');
    blade.style.setProperty('--y',p.y+'px');
    for(let i=ST.fruits.length-1;i>=0;i--){
      if(!ST.fruits[i].t.b&&hit(lastX,lastY,p.x,p.y,ST.fruits[i].x,ST.fruits[i].y,ST.fruits[i].r)){
        slice(i);
      } else if(ST.fruits[i].t.b&&hit(lastX,lastY,p.x,p.y,ST.fruits[i].x,ST.fruits[i].y,ST.fruits[i].r)){
        slice(i);
      }
    }
    ST.trails.push({x1:lastX,y1:lastY,x2:p.x,y2:p.y,l:1,ln:dist});
  }
  lastX=p.x; lastY=p.y;
}

function onEnd(e){
  e.preventDefault();
  lastX=0; lastY=0;
  blade.classList.remove('on');
}

C.addEventListener('touchstart',onStart,{passive:false});
C.addEventListener('touchmove',onMove,{passive:false});
C.addEventListener('touchend',onEnd,{passive:false});
C.addEventListener('mousedown',e=>{lastX=e.clientX;lastY=e.clientY});
C.addEventListener('mousemove',e=>{
  if(!lastX && !lastY) return;
  if(ST.over||ST.paused||!ST.started) return;
  const dist=Math.sqrt((e.clientX-lastX)**2+(e.clientY-lastY)**2);
  if(dist>4){
    for(let i=ST.fruits.length-1;i>=0;i--){
      if(hit(lastX,lastY,e.clientX,e.clientY,ST.fruits[i].x,ST.fruits[i].y,ST.fruits[i].r)){
        slice(i);
      }
    }
    ST.trails.push({x1:lastX,y1:lastY,x2:e.clientX,y2:e.clientY,l:1,ln:dist});
  }
  lastX=e.clientX;lastY=e.clientY;
});
C.addEventListener('mouseup',()=>{lastX=0;lastY=0});

// ---- Pause ----
document.getElementById('pauseBtn').addEventListener('click',()=>{
  if(!ST.started||ST.over) return;
  ST.paused=!ST.paused;
  if(ST.paused){
    document.getElementById('ovTitle').textContent='暂停';
    document.getElementById('ovScore').textContent='得分：'+ST.score;
    document.getElementById('ovBest').textContent='';
    document.getElementById('ovBtn').textContent='继续';
    document.getElementById('ovHint').textContent='';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('pauseBtn').textContent='▶';
  } else {
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('pauseBtn').textContent='II';
  }
});

// ---- Overlay button ----
document.getElementById('ovBtn').addEventListener('click',()=>{
  if(ST.paused){
    ST.paused=0;
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('pauseBtn').textContent='II';
  } else {
    start();
  }
});

// ---- Draw ----
function draw(){
  // Background
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#120820');
  g.addColorStop(1,'#0a0415');
  X.fillStyle=g;
  X.fillRect(0,0,W,H);

  // Stars
  X.save();
  ST.bg.forEach(s=>{
    s.t+=0.025;
    X.globalAlpha=0.25+0.25*Math.sin(s.t);
    X.fillStyle='#fff';
    X.beginPath();
    X.arc(s.x*W,s.y*H,s.s,0,6.283);
    X.fill();
  });
  X.globalAlpha=1;
  X.restore();

  // Trails
  ST.trails.forEach(t=>{
    X.globalAlpha=t.l*0.7;
    X.strokeStyle='#fff';
    X.lineWidth=Math.max(2,t.ln*0.12*t.l);
    X.lineCap='round';
    X.beginPath();
    X.moveTo(t.x1,t.y1);
    X.lineTo(t.x2,t.y2);
    X.stroke();
  });
  X.globalAlpha=1;

  // Fruits
  ST.fruits.forEach(f=>{
    X.save();
    X.translate(f.x,f.y);
    X.rotate(f.rot);
    X.font=f.r*2+'px serif';
    X.textAlign='center';
    X.textBaseline='middle';
    if(f.t.sr){X.shadowColor='#ffd700';X.shadowBlur=18;}
    if(f.t.b){X.shadowColor='#e74c3c';X.shadowBlur=14;}
    X.fillText(f.e,0,0);
    X.restore();
  });

  // Particles
  ST.pts.forEach(p=>{
    X.save();
    X.globalAlpha=p.l;
    if(p.tx){
      X.fillStyle=p.c;
      X.font='bold 26px sans-serif';
      X.textAlign='center';
      X.fillText(p.tx,p.x,p.y);
    } else if(p.hp){
      X.translate(p.x,p.y);
      X.rotate(p.rt);
      X.fillStyle=p.c;
      X.beginPath();
      X.arc(0,0,p.s,p.ha-0.4,p.ha+Math.PI+0.4);
      X.fill();
    } else {
      X.fillStyle=p.c;
      X.beginPath();
      X.arc(p.x,p.y,Math.max(0.5,p.s*p.l),0,6.283);
      X.fill();
    }
    X.restore();
  });

  // Level
  if(ST.started&&!ST.over){
    X.fillStyle='rgba(255,255,255,0.35)';
    X.font='14px sans-serif';
    X.textAlign='center';
    X.fillText('关卡 '+ST.lvl,W/2,72);
  }
}

// ---- Update ----
function update(){
  if(ST.paused||ST.over||!ST.started) return;

  // Level
  ST.lvlT++;
  if(ST.lvlT>600){ST.lvlT=0; ST.lvl=Math.min(ST.lvl+1,20); ST.diff=1+ST.lvl*0.3;}

  // Combo
  if(ST.comboT>0){
    ST.comboT--;
    if(ST.comboT===0){ ST.maxCombo=Math.max(ST.maxCombo,ST.combo); ST.combo=0; }
  }

  // Spawn
  spT--;
  if(spT<=0){
    spawn();
    if(Math.random()<0.35+ST.lvl*0.04) spawn();
    spT=Math.max(18,55-ST.lvl*3);
  }

  // Fruits
  for(let i=ST.fruits.length-1;i>=0;i--){
    const f=ST.fruits[i];
    f.vy+=f.t.g;
    f.x+=f.vx; f.y+=f.vy;
    f.rot+=f.rs;
    if(f.x-f.r<0){f.x=f.r;f.vx=Math.abs(f.vx)*0.8;}
    if(f.x+f.r>W){f.x=W-f.r;f.vx=-Math.abs(f.vx)*0.8;}
    if(f.y-f.r>H){ST.fruits.splice(i,1);continue;}
    if(f.y-f.r>H*0.9&&!f.falling){
      f.falling=true;
    }
    // Fell off bottom without slice
    if(f.y-f.r>H+30&&!f.t.b){
      ST.lives=Math.max(0,ST.lives-1);
      ST.combo=0; shk=5;
      hud();
      if(ST.lives<=0){ST.fruits.splice(i,1);gameOver();}
      else ST.fruits.splice(i,1);
    }
  }

  // Trails
  for(let i=ST.trails.length-1;i>=0;i--){
    ST.trails[i].l-=0.07;
    if(ST.trails[i].l<=0) ST.trails.splice(i,1);
  }

  // Particles
  for(let i=ST.pts.length-1;i>=0;i--){
    const p=ST.pts[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.18;
    if(p.hp) p.rt+=p.rsp;
    p.l-=0.022;
    if(p.l<=0) ST.pts.splice(i,1);
  }

  // Shake
  if(shk>0.5) shk*=0.82;
  else shk=0;
}

// ---- Loop ----
function loop(){
  update();
  X.save();
  if(shk>0.5){
    X.translate((Math.random()-0.5)*shk,(Math.random()-0.5)*shk);
  }
  draw();
  X.restore();
  requestAnimationFrame(loop);
}

loop();

})();
</script>
</body>
</html>
