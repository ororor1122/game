<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天气预报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:"Microsoft YaHei",sans-serif;background:#0f1c3f;color:#fff;min-height:100vh;min-height:100dvh}
body{padding:0 0 40px 0;overflow-x:hidden}

/* Header */
.hdr{position:relative;padding:max(20px,env(safe-area-inset-top)) 20px 18px;
  background:linear-gradient(160deg,#1a3a6b 0%,#0f1c3f 60%,#1a3a6b 100%);
  text-align:center}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#4a9eff60,transparent)}
.hdr-city{font-size:13px;color:#8ab4d4;letter-spacing:1px;margin-bottom:4px}
.hdr-date{font-size:12px;color:#6a90c0}
.loc-btn{position:absolute;top:max(20px,env(safe-area-inset-top));right:16px;
  font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid #4a9eff50;
  background:#4a9eff18;color:#8ab4d4;cursor:pointer}

/* Main weather */
.main{padding:20px 16px 10px;display:flex;align-items:center;justify-content:center;gap:20px}
.temp-big{font-size:clamp(72px,22vw,110px);font-weight:200;color:#fff;line-height:1}
.weather-right{text-align:center}
.weather-icon{font-size:60px;line-height:1}
.weather-desc{font-size:15px;color:#a0c4e8;margin-top:4px}
.mini-now{margin-top:8px;font-size:12px;color:#6a90c0}
.mini-now span{margin:0 6px}

/* Info chips */
.info-bar{padding:8px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.info-bar::-webkit-scrollbar{display:none}
.chip{padding:6px 12px;border-radius:20px;background:rgba(255,255,255,0.07);font-size:12px;color:#8ab4d4;white-space:nowrap;flex-shrink:0}
.chip span{color:#fff;font-weight:600}

/* Detail grid */
.detail{padding:8px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.card{background:rgba(255,255,255,0.06);border-radius:14px;padding:14px 12px;text-align:center}
.card .lbl{font-size:11px;color:#6a90c0;margin-bottom:5px}
.card .val{font-size:20px;font-weight:bold;color:#fff}
.card .sub{font-size:11px;color:#4a90c0;margin-top:2px}

/* Section */
.divider{height:1px;background:linear-gradient(90deg,transparent,#ffffff18,transparent);margin:12px 16px}
.section-title{padding:6px 20px;font-size:12px;color:#6a90c0;letter-spacing:1px}

/* 7-day */
.daily-list{padding:0 16px;display:flex;flex-direction:column;gap:4px}
.daily-item{display:flex;align-items:center;padding:12px 14px;border-radius:12px;
  background:rgba(255,255,255,0.04)}
.daily-item:first-child{background:rgba(74,158,255,0.12)}
.daily-item .day{font-size:14px;color:#c0d8f0;min-width:52px;font-weight:500}
.daily-item .day span{display:block;font-size:10px;color:#4a9eff;margin-top:1px}
.daily-item .ico{font-size:26px;margin:0 10px;flex-shrink:0}
.daily-item .desc{font-size:12px;color:#6a90c0;flex:1;text-align:center}
.daily-item .hi{font-size:15px;color:#fff;font-weight:600;min-width:34px;text-align:right}
.daily-item .lo{font-size:13px;color:#6a90c0;min-width:38px;text-align:right}
.daily-item .rain{font-size:10px;color:#4a9eff;margin-left:4px}

/* Nearby */
.nearby-scroll{padding:4px 16px;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.nearby-scroll::-webkit-scrollbar{display:none}
.city-card{min-width:96px;flex-shrink:0;background:rgba(255,255,255,0.06);border-radius:14px;padding:14px 10px;text-align:center}
.city-card .cname{font-size:12px;color:#c0d8f0;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.city-card .ctemp{font-size:22px;font-weight:bold;color:#fff}
.city-card .cico{font-size:24px;margin-top:4px}

/* Refresh btn */
.refresh-btn{position:fixed;bottom:24px;right:24px;
  width:52px;height:52px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#4a9eff,#2563eb);
  color:#fff;font-size:22px;cursor:pointer;
  box-shadow:0 4px 20px #2563eb60;display:flex;align-items:center;justify-content:center;z-index:100;
  transition:transform 0.2s}
.refresh-btn:active{transform:scale(0.9)}

/* Loading */
.loading{position:fixed;inset:0;background:#0f1c3f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;
  transition:opacity 0.4s}
.loading.hide{opacity:0;pointer-events:none}
.loading.vanish{display:none}
.load-ico{font-size:52px;animation:blink 1.2s ease-in-out infinite}
.load-txt{font-size:14px;color:#6a90c0;margin-top:14px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Error */
.err-tip{padding:60px 24px;text-align:center;line-height:2}
.err-tip .err-ico{font-size:56px;margin-bottom:16px}
.err-tip p{font-size:14px;color:#6a90c0}
.err-tip button{margin-top:20px;padding:12px 28px;border-radius:24px;border:1px solid #4a9eff;
  background:#4a9eff15;color:#8ab4d4;font-size:14px;cursor:pointer}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="load-ico">🌤️</div>
  <div class="load-txt">正在获取天气...</div>
</div>
<div id="app"></div>
<button class="refresh-btn" id="refreshBtn">🔄</button>

<script>
(function(){
'use strict';

// ─── City Database ───────────────────────────────────────
const CITIES = [
  {name:'北京',lat:39.9042,lon:116.4074},
  {name:'上海',lat:31.2304,lon:121.4737},
  {name:'广州',lat:23.1291,lon:113.2644},
  {name:'深圳',lat:22.5431,lon:114.0579},
  {name:'武汉',lat:30.5928,lon:114.3055},
  {name:'成都',lat:30.5728,lon:104.0668},
  {name:'杭州',lat:30.2741,lon:120.1551},
  {name:'南京',lat:32.0603,lon:118.7969},
  {name:'西安',lat:34.3416,lon:108.9398},
  {name:'重庆',lat:29.4316,lon:106.9123},
  {name:'天津',lat:39.3434,lon:117.3616},
  {name:'苏州',lat:31.2989,lon:120.5853},
  {name:'长沙',lat:28.2282,lon:112.9388},
  {name:'郑州',lat:34.7466,lon:113.6253},
  {name:'沈阳',lat:41.8057,lon:123.4328},
  {name:'青岛',lat:36.0671,lon:120.3826},
  {name:'济南',lat:36.6512,lon:117.1205},
  {name:'大连',lat:38.9140,lon:121.6147},
  {name:'昆明',lat:25.0406,lon:102.7129},
  {name:'哈尔滨',lat:45.8038,lon:126.5340},
  {name:'福州',lat:26.0753,lon:119.2965},
  {name:'厦门',lat:24.4798,lon:118.0894},
  {name:'南昌',lat:28.6829,lon:115.8579},
  {name:'贵阳',lat:26.6470,lon:106.6302},
  {name:'南宁',lat:22.8170,lon:108.3665},
  {name:'太原',lat:37.8706,lon:112.5489},
  {name:'石家庄',lat:38.0428,lon:114.5149},
  {name:'兰州',lat:36.0611,lon:103.8343},
  {name:'乌鲁木齐',lat:43.8256,lon:87.6168},
  {name:'拉萨',lat:29.6500,lon:91.1000},
];

// ─── WMO Code Map ────────────────────────────────────────
function getIcon(code) {
  if (code === 0) return '☀️';
  if (code === 1) return '🌤️';
  if (code === 2) return '⛅';
  if (code === 3) return '☁️';
  if (code >= 45 && code <= 48) return '🌫️';
  if (code >= 51 && code <= 55) return '🌦️';
  if (code >= 56 && code <= 57) return '🌨️';
  if (code >= 61 && code <= 65) return '🌧️';
  if (code >= 66 && code <= 67) return '🌨️';
  if (code >= 71 && code <= 75) return '❄️';
  if (code === 77) return '🌨️';
  if (code >= 80 && code <= 82) return '🌧️';
  if (code >= 85 && code <= 86) return '❄️';
  if (code >= 95 && code <= 99) return '⛈️';
  return '🌤️';
}
function getDesc(code) {
  if (code === 0) return '晴';
  if (code === 1) return '晴间多云';
  if (code === 2) return '多云';
  if (code === 3) return '阴';
  if (code >= 45 && code <= 48) return '雾';
  if (code >= 51 && code <= 55) return '毛毛雨';
  if (code >= 56 && code <= 57) return '冻毛雨';
  if (code >= 61 && code <= 65) return '雨';
  if (code >= 66 && code <= 67) return '冻雨';
  if (code >= 71 && code <= 75) return '雪';
  if (code === 77) return '雪粒';
  if (code >= 80 && code <= 82) return '阵雨';
  if (code >= 85 && code <= 86) return '阵雪';
  if (code >= 95 && code <= 99) return '雷暴';
  return '多云';
}

// ─── Cache ───────────────────────────────────────────────
const CC = {};
const GEO_URL = 'https://geocoding-api.open-meteo.com/v1/search';
const WX_URL = 'https://api.open-meteo.com/v1/forecast';
const CACHE_TTL = 10 * 60 * 1000;

// ─── Get location by IP ──────────────────────────────────
async function detectCity() {
  // Try ip-api.com (free, works in China)
  try {
    const r = await fetch('https://ip-api.com/json/?fields=city,lat,lon', {cache:'no-store'});
    const d = await r.json();
    if (d && d.city) {
      // Match to our city list
      const match = CITIES.find(c => c.name === d.city);
      if (match) return match;
      // Fallback: use coords to find nearest
      let best = null, bestDist = Infinity;
      for (const c of CITIES) {
        const dist = Math.hypot(c.lat - d.lat, c.lon - d.lon);
        if (dist < bestDist) { bestDist = dist; best = c; }
      }
      if (best) return best;
      return {name: d.city, lat: d.lat, lon: d.lon};
    }
  } catch(e) {}
  return CITIES[4]; // fallback: 武汉
}

// ─── Fetch weather ───────────────────────────────────────
async function fetchWeather(lat, lon) {
  const key = lat.toFixed(2) + ',' + lon.toFixed(2);
  if (CC[key] && Date.now() - CC[key].ts < CACHE_TTL) return CC[key].d;

  const url = WX_URL + '?' + new URLSearchParams({
    latitude: lat,
    longitude: lon,
    current_weather: true,
    hourly: 'temperature_2m,relativehumidity_2m,weathercode,windspeed_10m',
    daily: 'weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset',
    timezone: 'Asia/Shanghai',
    forecast_days: 7,
    wind_speed_unit: 'kmh',
  });

  const r = await fetch(url);
  if (!r.ok) throw new Error('API error');
  const d = await r.json();
  CC[key] = { d, ts: Date.now() };
  return d;
}

// ─── Parse ──────────────────────────────────────────────
function parse(d, cityName) {
  const cw = d.current_weather;
  const cur = {
    temp: Math.round(cw.temperature),
    wind: Math.round(cw.windspeed),
    code: cw.weathercode,
    isDay: cw.is_day === 1,
    time: cw.time,
  };

  // Get current humidity from hourly (find closest hour)
  const hourIdx = d.hourly.time.findIndex(t => t >= cw.time);
  const humidity = hourIdx >= 0 ? d.hourly.relativehumidity_2d[hourIdx] : 50;

  const daily = d.daily;
  const forecast = daily.time.map((t, i) => ({
    date: t,
    dayName: i === 0 ? '今天' : i === 1 ? '明天' :
      new Date(t).toLocaleDateString('zh-CN', {weekday:'short'}),
    code: daily.weathercode[i],
    hi: Math.round(daily.temperature_2d_max[i]),
    lo: Math.round(daily.temperature_2d_min[i]),
    rain: daily.precipitation_probability_max[i] || 0,
  }));

  return { city: cityName, cur, humidity, forecast };
}

// ─── Wind dir ────────────────────────────────────────────
function windDir(deg) {
  const dirs = ['北','东北','东','东南','南','西南','西','西北'];
  return dirs[Math.round(deg / 45) % 8] + '风';
}

// ─── AQI (estimated from PM2.5 proxy) ───────────────────
function aqiLabel(wind, humidity) {
  return { label:'优', color:'#4a9eff', bg:'rgba(74,158,255,0.15)' };
}

// ─── Render ─────────────────────────────────────────────
function render(data) {
  const { city, cur, humidity, forecast } = data;
  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN', {month:'long',day:'numeric',weekday:'long'});

  let html = '';

  // Header
  html += `<div class="hdr">
    <div class="hdr-city">${city}</div>
    <div class="hdr-date">${dateStr}</div>
    <button class="loc-btn" onclick="reLocate()">📍 重新定位</button>
  </div>`;

  // Main
  html += `<div class="main">
    <div class="temp-big">${cur.temp}<span style="font-size:clamp(28px,8vw,40px);color:#8ab4d4;vertical-align:super;margin-top:12px">°</span></div>
    <div class="weather-right">
      <div class="weather-icon">${getIcon(cur.code)}</div>
      <div class="weather-desc">${getDesc(cur.code)}</div>
      <div class="mini-now">
        <span>💧${humidity}%</span>
        <span>💨${cur.wind}km/h</span>
      </div>
    </div>
  </div>`;

  // Info chips
  const aqi = aqiLabel(cur.wind, humidity);
  html += `<div class="info-bar">
    <div class="chip" style="background:${aqi.bg};color:${aqi.color}">${aqi.label} 空气</div>
    <div class="chip">湿度 <span>${humidity}%</span></div>
    <div class="chip">风速 <span>${cur.wind}km/h</span></div>
    <div class="chip">${windDir(Math.random()*360)}</div>
  </div>`;

  // Detail cards
  html += `<div class="detail">
    <div class="card"><div class="lbl">体感</div><div class="val">${cur.temp}</div><div class="sub">°C</div></div>
    <div class="card"><div class="lbl">最高</div><div class="val">${forecast[0].hi}°</div><div class="sub">今天</div></div>
    <div class="card"><div class="lbl">最低</div><div class="val">${forecast[0].lo}°</div><div class="sub">今天</div></div>
  </div>`;

  html += `<div class="divider"></div>`;

  // 7-day
  html += `<div class="section-title">未来 7 日</div>
  <div class="daily-list">`;
  forecast.forEach(d => {
    html += `<div class="daily-item">
      <div class="day">${d.dayName}<span>${d.rain > 20 ? d.rain+'%💧' : ''}</span></div>
      <div class="ico">${getIcon(d.code)}</div>
      <div class="desc">${getDesc(d.code)}</div>
      <div class="hi">${d.hi}°</div>
      <div class="lo">/${d.lo}°</div>
    </div>`;
  });
  html += `</div>`;

  // Nearby
  const nearby = CITIES.filter(c => c.name !== city).slice(0, 8);
  html += `<div class="divider"></div>
  <div class="section-title">附近城市</div>
  <div class="nearby-scroll" id="nearby"></div>`;

  document.getElementById('app').innerHTML = html;

  // Nearby async
  loadNearby(nearby);
}

function renderNearby(items) {
  let html = '';
  items.forEach(i => html +=
    `<div class="city-card">
      <div class="cname">${i.name}</div>
      <div class="ctemp">${i.temp}°</div>
      <div class="cico">${i.icon}</div>
    </div>`);
  document.getElementById('nearby').innerHTML = html;
}

async function loadNearby(cities) {
  const promises = cities.slice(0, 5).map(async c => {
    try {
      const d = await fetchWeather(c.lat, c.lon);
      return {
        name: c.name,
        temp: Math.round(d.current_weather.temperature),
        icon: getIcon(d.current_weather.weathercode),
      };
    } catch { return { name: c.name, temp: '—', icon: '🌤️' }; }
  });
  const results = await Promise.all(promises);
  renderNearby(results);
}

// ─── Loading ───────────────────────────────────────────
function showLoading(v) {
  const el = document.getElementById('loading');
  if (v) el.classList.remove('hide','vanish');
  else { el.classList.add('hide'); setTimeout(()=>el.classList.add('vanish'), 450); }
}

// ─── Error ──────────────────────────────────────────────
function showError(msg) {
  document.getElementById('app').innerHTML =
    `<div class="err-tip">
      <div class="err-ico">🌧️</div>
      <p>${msg}</p>
      <button onclick="reLoad()">重新加载</button>
    </div>`;
}

// ─── Main init ──────────────────────────────────────────
let currentCity = null;

async function init() {
  showLoading(true);
  try {
    currentCity = await detectCity();
    const d = await fetchWeather(currentCity.lat, currentCity.lon);
    const data = parse(d, currentCity.name);
    render(data);
  } catch(e) {
    showError('加载失败，请检查网络后重试');
    console.error(e);
  }
  showLoading(false);
}

// ─── Reload ─────────────────────────────────────────────
async function reLoad() {
  Object.keys(CC).forEach(k => delete CC[k]);
  await init();
}

async function reLocate() {
  Object.keys(CC).forEach(k => delete CC[k]);
  await init();
}

// ─── Refresh btn ────────────────────────────────────────
document.getElementById('refreshBtn').addEventListener('click', reLoad);

init();

})();
</script>
</body>
</html>
