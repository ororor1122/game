<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天气预报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:"Microsoft YaHei",sans-serif;background:#0f1c3f;color:#fff;min-height:100vh;min-height:100dvh}
body{padding:0 0 30px 0;overflow-x:hidden}

/* Header */
.hdr{position:relative;padding:max(20px,env(safe-area-inset-top)) 20px 18px;
  background:linear-gradient(160deg,#1a3a6b 0%,#0f1c3f 60%,#1a3a6b 100%);
  text-align:center;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#4a9eff60,transparent)}
.hdr-city{font-size:13px;color:#8ab4d4;letter-spacing:1px;margin-bottom:4px}
.hdr-city::before{content:'📍 '}
.hdr-date{font-size:12px;color:#6a90c0}
.loc-btn{position:absolute;top:max(20px,env(safe-area-inset-top));right:16px;
  font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid #4a9eff50;
  background:#4a9eff18;color:#8ab4d4;cursor:pointer}
.loc-btn:active{background:#4a9eff30}

/* Main weather */
.main{padding:20px 16px 10px;display:flex;align-items:center;justify-content:center;gap:20px}
.temp-big{font-size:clamp(72px,22vw,110px);font-weight:200;color:#fff;line-height:1}
.temp-unit{font-size:28px;color:#8ab4d4;vertical-align:super;margin-top:10px}
.weather-right{text-align:center}
.weather-icon{font-size:60px;line-height:1}
.weather-desc{font-size:15px;color:#a0c4e8;margin-top:4px}
.mini-now{margin-top:8px;font-size:12px;color:#6a90c0}
.mini-now span{margin:0 6px}

/* AQI bar */
.aqi-bar{padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.aqi-tag{font-size:12px;padding:4px 10px;border-radius:20px;background:#4a9eff22;color:#8ab4d4}
.aqi-tag span{font-weight:bold}

/* Detail grid */
.detail{padding:8px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.detail-card{background:rgba(255,255,255,0.06);border-radius:14px;padding:14px 12px;text-align:center}
.detail-card .lbl{font-size:11px;color:#6a90c0;margin-bottom:6px}
.detail-card .val{font-size:20px;font-weight:bold;color:#fff}
.detail-card .sub{font-size:11px;color:#4a90c0;margin-top:2px}

/* Divider */
.divider{height:1px;background:linear-gradient(90deg,transparent,#ffffff18,transparent);margin:12px 16px}

/* 7-day forecast */
.section-title{padding:6px 20px;font-size:12px;color:#6a90c0;letter-spacing:1px}
.daily-list{padding:0 16px;display:flex;flex-direction:column;gap:1px}
.daily-item{display:flex;align-items:center;padding:11px 14px;border-radius:12px;
  background:rgba(255,255,255,0.04);transition:background 0.15s}
.daily-item:active{background:rgba(255,255,255,0.08)}
.daily-item .day{font-size:14px;color:#c0d8f0;min-width:56px}
.daily-item .day .tag{font-size:10px;color:#4a9eff;margin-left:3px}
.daily-item .ico{font-size:24px;margin:0 10px;flex-shrink:0}
.daily-item .desc{font-size:12px;color:#6a90c0;flex:1;text-align:center}
.daily-item .hi{font-size:14px;color:#fff;font-weight:600;min-width:32px;text-align:right}
.daily-item .lo{font-size:13px;color:#6a90c0;min-width:36px;text-align:right}

/* Nearby cities */
.nearby-scroll{padding:4px 16px;display:flex;gap:10px;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.nearby-scroll::-webkit-scrollbar{display:none}
.city-card{min-width:100px;flex-shrink:0;background:rgba(255,255,255,0.06);
  border-radius:14px;padding:14px 12px;text-align:center}
.city-card .cname{font-size:13px;color:#c0d8f0;margin-bottom:6px;white-space:nowrap}
.city-card .ctemp{font-size:22px;font-weight:bold;color:#fff}
.city-card .cico{font-size:26px;margin-top:4px}

/* Refresh */
.refresh-btn{position:fixed;bottom:20px;right:20px;
  width:50px;height:50px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#4a9eff,#2563eb);
  color:#fff;font-size:20px;cursor:pointer;
  box-shadow:0 4px 16px #2563eb50;display:flex;align-items:center;justify-content:center;
  z-index:100;transition:transform 0.2s}
.refresh-btn:active{transform:scale(0.92)}
.refresh-btn.rs{animation:spin 0.8s linear}
@keyframes spin{to{transform:rotate(360deg)}}

/* Loading */
.loading{position:fixed;inset:0;background:#0f1c3f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;
  transition:opacity 0.4s}
.loading.hide{opacity:0;pointer-events:none}
.loading.vanish{display:none}
.load-ico{font-size:48px;animation:blink 1s ease-in-out infinite}
.load-txt{font-size:14px;color:#6a90c0;margin-top:14px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* Error */
.err-tip{padding:40px 20px;text-align:center;font-size:14px;color:#6a90c0;line-height:1.8}
.err-tip button{margin-top:16px;padding:10px 24px;border-radius:20px;border:1px solid #4a9eff;
  background:#4a9eff18;color:#8ab4d4;cursor:pointer}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="load-ico">🌤️</div>
  <div class="load-txt">正在获取天气...</div>
</div>

<div id="app"></div>

<button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">🔄</button>

<script>
// ─── Config ───────────────────────────────────────────────
const CACHE_TTL = 10 * 60 * 1000; // 10 min
const nearbyCities = {
  '北京':{code:'Beijing',dist:'参考首都圈'},
  '上海':{code:'Shanghai',dist:'参考直辖市'},
  '广州':{code:'Guangzhou',dist:'参考一线'},
  '深圳':{code:'Shenzhen',dist:'参考特区'},
  '杭州':{code:'Hangzhou',dist:'参考省会'},
  '南京':{code:'Nanjing',dist:'参考江苏'},
  '武汉':{code:'Wuhan',dist:'参考湖北'},
  '成都':{code:'Chengdu',dist:'参考西南'},
  '西安':{code:'Xi\'an',dist:'参考西北'},
  '重庆':{code:'Chongqing',dist:'参考山城'},
};
let cache = {};

// ─── API ─────────────────────────────────────────────────
function getWeather(city) {
  const k = city + '_7';
  if (cache[k] && Date.now() - cache[k].ts < CACHE_TTL) return Promise.resolve(cache[k].d);
  // wttr.in
  const url = `https://wttr.in/${encodeURIComponent(city)}?format=j1&lang=zh`;
  return fetch(url).then(r => r.json()).then(d => {
    cache[k] = { d, ts: Date.now() };
    return d;
  });
}

// ─── Parse wttr.in ───────────────────────────────────────
function parseCurrent(d) {
  const c = d.current_condition[0];
  return {
    temp: c.temp_C,
    desc: getZhDesc(c.weatherCode, c.weatherDesc[0].value),
    icon: getIcon(+c.weatherCode),
    humidity: c.humidity,
    wind: c.windspeedKmph,
    windDir: c.winddir16Point,
    feelsLike: c.FeelsLikeC,
    uv: c.UVIndex,
    visibility: c.visibility,
    pressure: c.pressure,
    aqi: c.AQI ? c.AQI.value || '—' : '—',
  };
}

function parseDaily(d) {
  return d.weather.slice(0, 7).map((w, i) => ({
    date: i === 0 ? '今天' : i === 1 ? '明天' : new Date(w.date).toLocaleDateString('zh-CN', {weekday:'short'}),
    icon: getIcon(+w.weatherCode[0]),
    desc: getZhDesc(+w.weatherCode[0], ''),
    hi: w.maxtempC,
    lo: w.mintempC,
    rain: w.hourly.some(h => +h.rainProb > 30) ? +w.hourly[4].rainProb : 0,
  }));
}

// ─── Icons & descriptions ─────────────────────────────────
const iconMap = {
  113:'☀️',115:'☁️',116:'⛅',119:'☁️',122:'☁️',
  143:'🌫️',176:'🌦️',179:'🌨️',182:'🌨️',185:'🌨️',
  200:'⛈️',227:'🌨️',230:'❄️',
  248:'🌫️',260:'🌫️',263:'🌧️',266:'🌧️',281:'🌨️',
  284:'🌨️',293:'🌧️',296:'🌧️',299:'🌧️',302:'🌧️',
  305:'🌧️',308:'🌧️',311:'🌨️',314:'🌨️',317:'🌨️',
  320:'🌨️',323:'🌨️',326:'🌨️',329:'❄️',332:'❄️',
  335:'❄️',338:'❄️',350:'🌨️',353:'🌧️',356:'🌧️',
  359:'🌧️',362:'🌨️',365:'🌨️',368:'🌨️',371:'❄️',
  374:'🌨️',377:'🌨️',386:'⛈️',389:'⛈️',392:'⛈️',395:'❄️',
};
const descMap = {
  113:'晴',115:'多云',116:'阴',119:'阴',122:'阴',
  143:'雾',176:'阵雨',179:'阵雪',182:'雨夹雪',185:'雨夹雪',
  200:'雷暴',227:'小雪',230:'大雪',
  248:'大雾',260:'冻雾',263:'小雨',266:'小雨',281:'小雪',
  284:'中雪',293:'小雨',296:'中雨',299:'中雨',302:'中雨',
  305:'中雨',308:'大雨',311:'小雪',314:'中雪',317:'中雪',
  320:'中雪',323:'小雪',326:'中雪',329:'大雪',332:'大雪',
  335:'大雪',338:'冻雪',350:'阵雪',353:'小雨',356:'中雨',
  359:'大雨',362:'小雪',365:'中雪',368:'中雪',371:'大雪',
  374:'阵雪',377:'阵雪',386:'雷阵雨',389:'雷阵雨',392:'雷阵雨',395:'大雪',
};
function getIcon(code) { return iconMap[code] || '🌤️'; }
function getZhDesc(code, fallback) { return descMap[code] || fallback || '多云'; }

// ─── Render ──────────────────────────────────────────────
function render(city, cur, daily) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN', {month:'long',day:'numeric',weekday:'long'});
  const dayNames = ['日','一','二','三','四','五','六'];

  const nearbyKeys = Object.keys(nearbyCities).filter(k => k !== city).slice(0, 5);
  // Fill if needed
  while (nearbyKeys.length < 5) {
    const extras = Object.keys(nearbyCities).filter(k => !nearbyKeys.includes(k) && k !== city);
    nearbyKeys.push(extras[nearbyKeys.length % extras.length] || '武汉');
  }

  let app = '';

  // Header
  app += `<div class="hdr">
    <div class="hdr-city" id="hdrCity">${city}</div>
    <div class="hdr-date">${dateStr}</div>
    <button class="loc-btn" onclick="relocate()">📍 重新定位</button>
  </div>`;

  // Main
  app += `<div class="main">
    <div class="temp-big">${cur.temp}<span class="temp-unit">°</span></div>
    <div class="weather-right">
      <div class="weather-icon">${cur.icon}</div>
      <div class="weather-desc">${cur.desc}</div>
      <div class="mini-now">
        <span>💧${cur.humidity}%</span>
        <span>💨${cur.wind}km/h</span>
        <span>体感${cur.feelsLike}°</span>
      </div>
    </div>
  </div>`;

  // AQI
  const aqiLevel = cur.aqi > 150 ? '😷 重度' : cur.aqi > 100 ? '😐 轻度' : cur.aqi > 50 ? '😊 良' : '🌟 优';
  const aqiBg = cur.aqi > 150 ? '#e74c3c18' : cur.aqi > 100 ? '#f39c1218' : cur.aqi > 50 ? '#2ecc7118' : '#4a9eff18';
  const aqiColor = cur.aqi > 150 ? '#e74c3c' : cur.aqi > 100 ? '#f39c12' : cur.aqi > 50 ? '#2ecc71' : '#4a9eff';
  app += `<div class="aqi-bar">
    <div class="aqi-tag" style="background:${aqiBg};color:${aqiColor}">空气质量 ${aqiLevel} <span>AQI ${cur.aqi}</span></div>
    <div class="aqi-tag">紫外线 <span>${cur.uv}级</span></div>
    <div class="aqi-tag">能见度 <span>${cur.visibility}km</span></div>
  </div>`;

  // Details
  app += `<div class="detail">
    <div class="detail-card"><div class="lbl">气压</div><div class="val">${cur.pressure}</div><div class="sub">hPa</div></div>
    <div class="detail-card"><div class="lbl">湿度</div><div class="val">${cur.humidity}</div><div class="sub">%</div></div>
    <div class="detail-card"><div class="lbl">风速</div><div class="val">${cur.wind}</div><div class="sub">km/h ${cur.windDir}</div></div>
  </div>`;

  app += `<div class="divider"></div>`;

  // 7-day
  app += `<div class="section-title">未来 7 日预报</div>
  <div class="daily-list">`;
  daily.forEach(d => {
    const rainBadge = d.rain > 30 ? ` <span style="color:#4a9eff;font-size:10px">${d.rain}%💧</span>` : '';
    app += `<div class="daily-item">
      <div class="day">${d.date}${rainBadge}</div>
      <div class="ico">${d.icon}</div>
      <div class="desc">${d.desc}</div>
      <div class="hi">${d.hi}°</div>
      <div class="lo">/${d.lo}°</div>
    </div>`;
  });
  app += `</div>`;

  // Nearby
  app += `<div class="divider"></div>
  <div class="section-title">附近城市</div>
  <div class="nearby-scroll" id="nearbyScroll"></div>`;

  document.getElementById('app').innerHTML = app;

  // Load nearby cities
  loadNearby(nearbyKeys.slice(0, 5));
}

function renderNearby(divId, items) {
  let html = '';
  items.forEach(item => {
    html += `<div class="city-card">
      <div class="cname">${item.city}</div>
      <div class="ctemp">${item.temp}°</div>
      <div class="cico">${item.icon}</div>
    </div>`;
  });
  const el = document.getElementById(divId);
  if (el) el.innerHTML = html;
}

async function loadNearby(cities) {
  const promises = cities.map(city =>
    getWeather(city).then(d => ({
      city,
      temp: d.current_condition[0].temp_C,
      icon: getIcon(+d.current_condition[0].weatherCode),
    })).catch(() => ({ city, temp: '—', icon: '🌤️' }))
  );
  const results = await Promise.all(promises);
  renderNearby('nearbyScroll', results);
}

// ─── Init ────────────────────────────────────────────────
let myCity = '';

async function init() {
  showLoading(true);
  try {
    myCity = await detectCity();
  } catch(e) {
    myCity = '武汉'; // fallback
  }
  try {
    const d = await getWeather(myCity);
    const cur = parseCurrent(d);
    const daily = parseDaily(d);
    render(myCity, cur, daily);
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="err-tip">加载失败，请检查网络后点击刷新按钮重试。<br><button onclick="refreshAll()">重新加载</button></div>`;
  }
  showLoading(false);
}

// ─── Detect city via IP ─────────────────────────────────
async function detectCity() {
  try {
    const r = await fetch('https://wttr.in/?format=loc', {cache:'no-store'});
    const loc = await r.text(); // e.g. "23.1N,113.3E\nGuangzhou, China"
    const parts = loc.trim().split('\n');
    const cityPart = parts[parts.length - 1];
    const city = cityPart.split(',')[0].trim();
    // Map to Chinese name
    const map = {
      'Beijing':'北京','Shanghai':'上海','Guangzhou':'广州','Shenzhen':'深圳',
      'Chongqing':'重庆','Tianjin':'天津','Wuhan':'武汉','Chengdu':'成都',
      'Hangzhou':'杭州','Nanjing':'南京','Xi\'an':'西安','Suzhou':'苏州',
      'Qingdao':'青岛','Dalian':'大连','Changsha':'长沙','Zhengzhou':'郑州',
      'Shenyang':'沈阳','Kunming':'昆明','Harbin':'哈尔滨','Changchun':'长春',
      'Taipei':'台北','Hong Kong':'香港','Macau':'澳门',
    };
    for(const [en,zh] of Object.entries(map)) {
      if(city.toLowerCase().includes(en.toLowerCase())) return zh;
    }
    // Try wttr.in Chinese city name
    if(city.includes('City') || city.includes('Province')) {
      const r2 = await fetch('https://wttr.in/' + encodeURIComponent(city) + '?format=j1');
      // Already got it above
    }
    return city;
  } catch(e) {
    return '武汉';
  }
}

// ─── Relocate ────────────────────────────────────────────
async function relocate() {
  showLoading(true);
  try {
    myCity = await detectCity();
    const d = await getWeather(myCity);
    const cur = parseCurrent(d);
    const daily = parseDaily(d);
    render(myCity, cur, daily);
  } catch(e) {
    showLoading(false);
  }
}

// ─── Refresh ─────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('rs');
  // Clear cache
  cache = {};
  await init();
  setTimeout(()=>btn.classList.remove('rs'), 900);
}

// ─── Loading ─────────────────────────────────────────────
function showLoading(v) {
  const el = document.getElementById('loading');
  if(v) el.classList.remove('hide','vanish');
  else { el.classList.add('hide'); setTimeout(()=>el.classList.add('vanish'), 450); }
}

init();
</script>
</body>
</html>
