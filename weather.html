<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天气预报</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:"Microsoft YaHei",sans-serif;background:#0f1c3f;color:#fff;min-height:100vh}
body{padding:0 0 50px 0}

/* Header */
.hdr{position:relative;padding:max(20px,env(safe-area-inset-top)) 20px 16px;
  background:linear-gradient(160deg,#1a3a6b,#0f1c3f);
  text-align:center;border-bottom:1px solid rgba(74,158,255,0.15)}
.hdr-city{font-size:14px;color:#8ab4d4;letter-spacing:1px;margin-bottom:3px}
.hdr-date{font-size:12px;color:#5a80aa}
.loc-btn{position:absolute;top:max(18px,env(safe-area-inset-top));right:14px;
  font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid rgba(74,158,255,.3);
  background:rgba(74,158,255,.1);color:#7aacd4;cursor:pointer;display:none}

/* Main */
.main{padding:24px 16px 12px;display:flex;align-items:center;justify-content:center;gap:24px}
.temp-big{font-size:clamp(80px,25vw,120px);font-weight:200;line-height:1}
.weather-right{text-align:center}
.weather-icon{font-size:clamp(52px,14vw,68px)}
.weather-desc{font-size:15px;color:#9ab8d6;margin-top:4px}
.mini-tags{margin-top:8px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.07);font-size:11px;color:#6a8ab0}

/* Chips */
.chip-row{padding:6px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.06);font-size:12px;color:#8ab4d4;white-space:nowrap;flex-shrink:0}
.chip b{color:#fff}

/* Detail */
.detail{padding:8px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card{background:rgba(255,255,255,.06);border-radius:14px;padding:14px 8px;text-align:center}
.card .lbl{font-size:11px;color:#5a7a9a;margin-bottom:5px}
.card .val{font-size:21px;font-weight:700;color:#fff}
.card .sub{font-size:10px;color:#4a7090;margin-top:2px}

/* Divider */
.div{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);margin:12px 16px}
.title{padding:4px 20px;font-size:11px;color:#4a7090;letter-spacing:2px}

/* 7-day */
.day-list{padding:0 16px;display:flex;flex-direction:column;gap:3px}
.day-item{display:flex;align-items:center;padding:12px 12px;border-radius:12px;
  background:rgba(255,255,255,.04)}
.day-item:first-child{background:rgba(74,158,255,.1)}
.dy{font-size:14px;color:#b0cce0;min-width:50px;font-weight:500}
.dy small{display:block;font-size:10px;color:#4a9eff;margin-top:1px}
.ico{mx:12px;font-size:26px;margin:0 10px;flex-shrink:0}
.dsc{flex:1;text-align:center;font-size:12px;color:#5a7a9a}
.hi{font-size:15px;color:#fff;font-weight:600;min-width:32px;text-align:right}
.lo{font-size:13px;color:#5a7a9a;min-width:36px;text-align:right}

/* Nearby */
.nearby{padding:4px 16px;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:8px}
.nearby::-webkit-scrollbar{display:none}
.nc{min-width:96px;flex-shrink:0;background:rgba(255,255,255,.06);border-radius:14px;padding:14px 10px;text-align:center}
.nc .cn{font-size:12px;color:#b0cce0;margin-bottom:5px;white-space:nowrap}
.nc .ct{font-size:22px;font-weight:700;color:#fff}
.nc .ci{font-size:24px;margin-top:4px}

/* Refresh */
.rbtn{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#4a9eff,#2563eb);color:#fff;font-size:22px;
  box-shadow:0 4px 20px rgba(37,99,235,.5);display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:100;transition:transform .2s}
.rbtn:active{transform:scale(.9)}

/* Loading */
.load{position:fixed;inset:0;background:#0f1c3f;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:200;transition:opacity .4s}
.load.out{opacity:0;pointer-events:none}
.load.gone{display:none}
.load .ic{font-size:56px;animation:bb 1.2s ease-in-out infinite}
.load .tx{font-size:14px;color:#5a7a9a;margin-top:16px}
@keyframes bb{0%,100%{opacity:1}50%{opacity:.3}}

/* Error */
.emsg{padding:60px 24px;text-align:center}
.emsg .ei{font-size:56px;margin-bottom:16px}
.emsg p{font-size:14px;color:#5a7a9a;line-height:2}
.emsg button{margin-top:20px;padding:12px 28px;border-radius:24px;
  border:1px solid rgba(74,158,255,.5);background:rgba(74,158,255,.1);
  color:#8ab4d4;font-size:14px;cursor:pointer}
</style>
</head>
<body>

<div class="load" id="ld">
  <div class="ic">&#127780;</div>
  <div class="tx">正在获取天气...</div>
</div>
<div id="app"></div>
<button class="rbtn" id="rbtn">&#x1f504;</button>

<script>
(function(){
'use strict';

// ─── City DB (30 cities, hardcoded coords) ─────────────
const DB = [
  {n:'北京',  la:39.9042, lo:116.4074},
  {n:'上海',  la:31.2304, lo:121.4737},
  {n:'广州',  la:23.1291, lo:113.2644},
  {n:'深圳',  la:22.5431, lo:114.0579},
  {n:'武汉',  la:30.5928, lo:114.3055},
  {n:'成都',  la:30.5728, lo:104.0668},
  {n:'杭州',  la:30.2741, lo:120.1551},
  {n:'南京',  la:32.0603, lo:118.7969},
  {n:'西安',  la:34.3416, lo:108.9398},
  {n:'重庆',  la:29.4316, lo:106.9123},
  {n:'天津',  la:39.3434, lo:117.3616},
  {n:'苏州',  la:31.2989, lo:120.5853},
  {n:'长沙',  la:28.2282, lo:112.9388},
  {n:'郑州',  la:34.7466, lo:113.6253},
  {n:'沈阳',  la:41.8057, lo:123.4328},
  {n:'青岛',  la:36.0671, lo:120.3826},
  {n:'济南',  la:36.6512, lo:117.1205},
  {n:'大连',  la:38.9140, lo:121.6147},
  {n:'昆明',  la:25.0406, lo:102.7129},
  {n:'哈尔滨',la:45.8038, lo:126.5340},
  {n:'福州',  la:26.0753, lo:119.2965},
  {n:'厦门',  la:24.4798, lo:118.0894},
  {n:'南昌',  la:28.6829, lo:115.8579},
  {n:'贵阳',  la:26.6470, lo:106.6302},
  {n:'南宁',  la:22.8170, lo:108.3665},
  {n:'太原',  la:37.8706, lo:112.5489},
  {n:'石家庄',la:38.0428, lo:114.5149},
  {n:'兰州',  la:36.0611, lo:103.8343},
  {n:'乌鲁木齐',la:43.8256,lo:87.6168},
  {n:'拉萨',  la:29.6500, lo:91.1000},
];

// ─── WMO icon / desc ───────────────────────────────────
function icon(c){
  if(c===0)return'&#26000;';
  if(c===1)return'&#127780;';
  if(c===2)return'&#9925;';
  if(c===3)return'&#9729;';
  if(c>=45&&c<=48)return'&#127787;';
  if(c>=51&&c<=55)return'&#127780;';
  if(c>=56&&c<=57)return'&#127781;';
  if(c>=61&&c<=65)return'&#127783;';
  if(c>=66&&c<=67)return'&#127781;';
  if(c>=71&&c<=75)return'&#127784;';
  if(c===77)return'&#127781;';
  if(c>=80&&c<=82)return'&#127782;';
  if(c>=85&&c<=86)return'&#127784;';
  if(c>=95&&c<=99)return'&#9889;';
  return'&#127781;';
}
function desc(c){
  if(c===0)return'晴';
  if(c===1)return'晴间多云';
  if(c===2)return'多云';
  if(c===3)return'阴';
  if(c>=45&&c<=48)return'雾';
  if(c>=51&&c<=55)return'毛毛雨';
  if(c>=56&&c<=57)return'冻雨';
  if(c>=61&&c<=65)return'雨';
  if(c>=66&&c<=67)return'冻雨';
  if(c>=71&&c<=75)return'雪';
  if(c===77)return'雪粒';
  if(c>=80&&c<=82)return'阵雨';
  if(c>=85&&c<=86)return'阵雪';
  if(c>=95&&c<=99)return'雷暴';
  return'多云';
}

// ─── Cache ─────────────────────────────────────────────
const CC = {}; // lat,lon -> {d,ts}

// ─── Fetch weather (Open-Meteo) ─────────────────────────
async function wx(lat, lon) {
  const k = lat.toFixed(2)+','+lon.toFixed(2);
  if(CC[k] && Date.now()-CC[k].ts < 600000) return CC[k].d;
  const u = 'https://api.open-meteo.com/v1/forecast?'+
    new URLSearchParams({
      latitude:lat, longitude:lon,
      current_weather:true,
      hourly:'temperature_2m,relativehumidity_2m,weathercode',
      daily:'weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max',
      timezone:'Asia/Shanghai',forecast_days:7,wind_speed_unit:'kmh',
    });
  const r = await fetch(u);
  if(!r.ok) throw new Error('fetch error '+r.status);
  const d = await r.json();
  CC[k] = {d, ts:Date.now()};
  return d;
}

// ─── Find nearest city in DB ───────────────────────────
function nearest(lat, lo) {
  let b=null,bd=Infinity;
  for(const c of DB){
    const d2=(c.la-lat)**2+(c.lo-lo)**2;
    if(d2<bd){bd=d2;b=c;}
  }
  return b;
}

// ─── Detect location (browser GPS) ─────────────────────
function detectGPS() {
  return new Promise((res, rej) => {
    if(!navigator.geolocation) { rej(new Error('no gps')); return; }
    navigator.geolocation.getCurrentPosition(
      p => res({lat: p.coords.latitude, lon: p.coords.longitude}),
      e => rej(e),
      {timeout:8000, maximumAge:300000}
    );
  });
}

// ─── Parse ─────────────────────────────────────────────
function parse(d) {
  const cw = d.current_weather;
  const now = d.hourly.time.indexOf(cw.time);
  const hum = now >= 0 ? d.hourly.relativehumidity_2d[now] : 50;
  const daily = d.daily;
  return {
    temp: Math.round(cw.temperature),
    wind: Math.round(cw.windspeed),
    code: cw.weathercode,
    isDay: cw.is_day===1,
    hum,
    daily: daily.time.map((t,i)=>({
      date:t,
      day: i===0?'今天':i===1?'明天':
        new Date(t).toLocaleDateString('zh-CN',{weekday:'short'}),
      code: daily.weathercode[i],
      hi: Math.round(daily.temperature_2m_max[i]),
      lo: Math.round(daily.temperature_2m_min[i]),
      rain: daily.precipitation_probability_max[i]||0,
    })),
  };
}

// ─── Render ─────────────────────────────────────────────
function render(city, data, nearby) {
  const d = data;
  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});
  const windDirs='北东北东东南南西南西西北'.match(/../g);
  const wdir = windDirs[Math.round((d.wind||0)/45)%8]||'北';

  let h='';
  h+=`<div class="hdr">
    <div class="hdr-city">${city}</div>
    <div class="hdr-date">${dateStr}</div>
    <button class="loc-btn" id="lbtn" onclick="doGPS()">&#128205; 重新定位</button>
  </div>`;

  h+=`<div class="main">
    <div class="temp-big">${d.temp}<span style="font-size:clamp(28px,8vw,40px);color:#7aacd4;vertical-align:super;margin-top:14px">&#176;</span></div>
    <div class="weather-right">
      <div class="weather-icon">${icon(d.code)}</div>
      <div class="weather-desc">${desc(d.code)}</div>
      <div class="mini-tags">
        <span class="tag">&#128167;${d.hum}%</span>
        <span class="tag">${wdir}风 ${d.wind}km/h</span>
      </div>
    </div>
  </div>`;

  h+=`<div class="chip-row">
    <span class="chip">&#128167;湿度 <b>${d.hum}%</b></span>
    <span class="chip">${wdir}风 <b>${d.wind}km/h</b></span>
    <span class="chip">体感 <b>${d.temp}&#176;</b></span>
  </div>`;

  h+=`<div class="detail">
    <div class="card"><div class="lbl">最高</div><div class="val">${d.daily[0].hi}&#176;</div><div class="sub">今天</div></div>
    <div class="card"><div class="lbl">最低</div><div class="val">${d.daily[0].lo}&#176;</div><div class="sub">今天</div></div>
    <div class="card"><div class="lbl">降水概率</div><div class="val">${d.daily[0].rain}%</div><div class="sub">今日最大</div></div>
  </div>`;

  h+=`<div class="div"></div>
  <div class="title">未来 7 日预报</div>
  <div class="day-list">`;
  d.daily.forEach(day=>{
    h+=`<div class="day-item">
      <div class="dy">${day.day}${day.rain>20?'<small>'+day.rain+'%</small>':''}</div>
      <div class="ico">${icon(day.code)}</div>
      <div class="dsc">${desc(day.code)}</div>
      <div class="hi">${day.hi}&#176;</div>
      <div class="lo">/${day.lo}&#176;</div>
    </div>`;
  });
  h+=`</div>`;

  // Nearby
  h+=`<div class="div"></div>
  <div class="title">附近城市</div>
  <div class="nearby" id="nlist"></div>`;

  document.getElementById('app').innerHTML = h;
  document.getElementById('lbtn').style.display = 'block';

  // Load nearby
  const cities = DB.filter(c=>c.n!==city).slice(0,5);
  Promise.all(cities.map(async c=>{
    try{
      const wd = await wx(c.la, c.lo);
      return {n:c.n, t:Math.round(wd.current_weather.temperature), i:icon(wd.current_weather.weathercode)};
    }catch{return {n:c.n,t:'--',i:'&#127781;'};}
  })).then(rs=>{
    let nh='<div class="nc"><div class="cn">定位中...</div></div>';
    if(rs.length>0) nh=rs.map(r=>`<div class="nc"><div class="cn">${r.n}</div><div class="ct">${r.t}&#176;</div><div class="ci">${r.i}</div></div>`).join('');
    document.getElementById('nlist').innerHTML=nh;
  });
}

// ─── Error screen ───────────────────────────────────────
function showErr(msg) {
  document.getElementById('app').innerHTML=
    `<div class="emsg"><div class="ei">&#127782;</div><p>${msg}</p><button onclick="init()">重新加载</button></div>`;
}

// ─── Loading ───────────────────────────────────────────
function load(v){const e=document.getElementById('ld');if(v){e.classList.remove('out','gone');}else{e.classList.add('out');setTimeout(()=>e.classList.add('gone'),400);}}

// ─── Init ───────────────────────────────────────────────
let curCity = null;

async function init() {
  load(true);
  try {
    let loc = null;

    // Try browser GPS first
    try {
      loc = await detectGPS();
    } catch(gpsErr) {
      // GPS denied or unavailable — use IP-based fallback below
    }

    // If GPS failed, try navigator.userAgent to pick a default
    // (we use Wuhan as default city for any mainland China user)
    let cityObj;
    if (loc) {
      cityObj = nearest(loc.lat, loc.lon);
    } else {
      // No GPS — use default (Wuhan)
      cityObj = DB.find(c=>c.n==='武汉');
    }
    curCity = cityObj.n;

    const d = await wx(cityObj.la, cityObj.lo);
    const data = parse(d);
    render(curCity, data, []);
  } catch(e) {
    showErr('加载失败，请检查网络后点击<br><b>重新加载</b>按钮重试');
  } finally {
    load(false);
  }
}

// ─── GPS button ─────────────────────────────────────────
async function doGPS() {
  load(true);
  try {
    const loc = await detectGPS();
    const cityObj = nearest(loc.lat, loc.lon);
    curCity = cityObj.n;
    const d = await wx(cityObj.la, cityObj.lo);
    render(curCity, parse(d), []);
  } catch(e) {
    showErr('定位失败，请确认已授权位置权限');
  }
  load(false);
}

// ─── Refresh ────────────────────────────────────────────
document.getElementById('rbtn').addEventListener('click', ()=>{
  // Clear cache
  Object.keys(CC).forEach(k=>delete CC[k]);
  init();
});

init();
})();
</script>
</body>
</html>
