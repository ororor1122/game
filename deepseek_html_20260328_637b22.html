<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>宇宙飞船 | 数学挑战 | 20以内加减法</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }
        .panel {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            padding: 12px 24px;
            border-radius: 30px;
            color: #ffdd88;
            border-left: 4px solid #ffaa44;
            border-right: 4px solid #ffaa44;
            font-size: 1.4rem;
            letter-spacing: 1px;
            pointer-events: none;
            font-family: monospace;
        }
        .question-panel {
            background: rgba(0,0,0,0.85);
            font-size: 2rem;
            font-weight: bold;
            color: #ffdd99;
            text-align: center;
            border-radius: 50px;
            padding: 12px 32px;
            border: 2px solid gold;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .score-speed {
            display: flex;
            gap: 20px;
        }
        #game-over-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 40px;
            text-align: center;
            color: white;
            border: 2px solid #ffaa44;
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 20px;
            min-width: 320px;
            pointer-events: auto;
            font-family: monospace;
        }
        #rank-list {
            text-align: left;
            margin: 10px 0;
            max-height: 250px;
            overflow-y: auto;
            background: #111;
            padding: 10px;
            border-radius: 16px;
        }
        .rank-entry {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            border-bottom: 1px solid #333;
            font-size: 1.1rem;
        }
        .rank-entry span:first-child { color: gold; font-weight: bold; }
        .rank-entry span:last-child { color: #ffaa66; }
        input {
            background: #222;
            border: 2px solid #ffaa44;
            padding: 8px 12px;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 2px;
            font-family: monospace;
            font-weight: bold;
            outline: none;
        }
        button {
            background: #ffaa44;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }
        button:hover {
            background: #ffcc66;
            transform: scale(1.02);
        }
        #name-input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .info-text {
            font-size: 0.9rem;
            color: #ccc;
        }
        .screen-shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }
        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(5px, 5px); }
            75% { transform: translate(-5px, -5px); }
            100% { transform: translate(0, 0); }
        }
        .red-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0.4);
            pointer-events: none;
            z-index: 999;
            animation: fadeOut 0.3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 0.6; }
            100% { opacity: 0; visibility: hidden; }
        }
        .plus-one {
            position: absolute;
            color: #ffdd44;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 5px #ffaa00;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        #controls-tip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            .panel { font-size: 0.9rem; padding: 6px 12px; }
            .question-panel { font-size: 1.2rem; padding: 6px 16px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="panel score-speed">
            <span>⭐ 分数: <span id="scoreValue">0</span></span>
            <span style="margin-left: 20px;">⚡ 速度: <span id="speedValue">1.00</span></span>
        </div>
        <div class="question-panel" id="questionText">
            0 + 0 = ?
        </div>
    </div>
    <div id="game-over-panel">
        <h2 style="margin:0; color:#ffaa44;">💥 游戏结束 💥</h2>
        <div id="final-score" style="font-size: 1.8rem;">得分: 0</div>
        <div id="rank-title">🏆 排行榜 (前五名) 🏆</div>
        <div id="rank-list"></div>
        <div id="name-input-area" style="display: none;">
            <input type="text" id="player-name" maxlength="3" placeholder="三个大写字母" autocomplete="off" style="text-transform: uppercase;">
            <button id="submit-score">记录成绩</button>
            <div class="info-text">※ 仅输入大写字母 A-Z</div>
        </div>
        <button id="restart-btn">重新起飞 🚀</button>
    </div>
    <div id="controls-tip">
        🎮 键盘: <kbd>W/A/S/D</kbd> 或 <kbd>↑/←/↓/→</kbd> 移动飞船 | 🎯 碰撞正确数字得1分，错误数字游戏结束 | 数字随机移动
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- 游戏配置 ----------
        const INIT_SPEED_MULTIPLIER = 1.2;
        const SPEED_INCREASE_RATE = 0.1;
        const MAX_SPEED_MULT = 2.8;
        const NUMBERS_COUNT = 20;
        const PLAYER_RADIUS = 0.7;
        const NUMBER_RADIUS = 0.55;
        const WORLD_SIZE = 9;           // 缩小地图边界，使整个区域在视野内
        const PLAYER_SPEED = 7.5;
        const NUMBER_BASE_SPEED = 2.5;
        
        let currentScore = 0;
        let currentSpeedMult = 1.0;
        let gameActive = true;
        let currentQuestion = { text: "", answer: 0 };
        let numbers = [];
        let playerMesh = null;
        let scene, camera, renderer;
        let clock = new THREE.Clock();
        let requestId = null;
        
        const keyState = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false
        };
        
        let rankData = [];
        let cameraOriginalPos = null;
        
        // ---------- 数学题生成 (20以内加减法) ----------
        function generateMathQuestion() {
            const useAdd = Math.random() > 0.5;
            let a, b, answer, text;
            if (useAdd) {
                a = Math.floor(Math.random() * 20) + 1;
                b = Math.floor(Math.random() * (21 - a)) + 1;
                answer = a + b;
                text = `${a} + ${b} = ?`;
            } else {
                a = Math.floor(Math.random() * 20) + 1;
                b = Math.floor(Math.random() * a) + 1;
                answer = a - b;
                text = `${a} - ${b} = ?`;
            }
            answer = Math.min(20, Math.max(1, answer));
            return { text, answer };
        }
        
        function updateQuestionUI() {
            document.getElementById('questionText').innerHTML = currentQuestion.text;
        }
        
        function getRandomValue(exclude = null) {
            let val;
            do {
                val = Math.floor(Math.random() * 20) + 1;
            } while (val === exclude);
            return val;
        }
        
        // 创建数字纹理 (统一橙色)
        function createNumberTexture(value) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e68a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ffcc88';
            ctx.lineWidth = 12;
            ctx.strokeRect(6, 6, canvas.width - 12, canvas.height - 12);
            ctx.fillStyle = 'white';
            ctx.font = `Bold ${canvas.width * 0.55}px "Courier New"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(value.toString(), canvas.width/2, canvas.height/2);
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }
        
        function createNumberCube(value) {
            const texture = createNumberTexture(value);
            const material = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.3, metalness: 0.2, emissive: 0x331a00 });
            const geometry = new THREE.BoxGeometry(0.85, 0.85, 0.85);
            const cube = new THREE.Mesh(geometry, material);
            cube.castShadow = true;
            cube.userData = { value };
            return cube;
        }
        
        function getRandomSpawnPosition(avoidPlayer = true, playerPos = null) {
            let x, z;
            const bound = WORLD_SIZE - 1.2;
            for (let i = 0; i < 30; i++) {
                x = (Math.random() - 0.5) * bound * 2;
                z = (Math.random() - 0.5) * bound * 2;
                if (avoidPlayer && playerPos) {
                    if (Math.hypot(x - playerPos.x, z - playerPos.z) > 1.8) break;
                } else break;
            }
            return new THREE.Vector3(x, 0, z);
        }
        
        function resolveNumberCollisions() {
            for (let i = 0; i < numbers.length; i++) {
                for (let j = i + 1; j < numbers.length; j++) {
                    const a = numbers[i].mesh;
                    const b = numbers[j].mesh;
                    const dx = a.position.x - b.position.x;
                    const dz = a.position.z - b.position.z;
                    const dist = Math.hypot(dx, dz);
                    const minDist = NUMBER_RADIUS * 2;
                    if (dist < minDist) {
                        const angle = Math.atan2(dz, dx);
                        const overlap = minDist - dist;
                        const moveX = Math.cos(angle) * overlap * 0.5;
                        const moveZ = Math.sin(angle) * overlap * 0.5;
                        a.position.x += moveX;
                        a.position.z += moveZ;
                        b.position.x -= moveX;
                        b.position.z -= moveZ;
                        const bound = WORLD_SIZE - NUMBER_RADIUS;
                        a.position.x = Math.min(bound, Math.max(-bound, a.position.x));
                        a.position.z = Math.min(bound, Math.max(-bound, a.position.z));
                        b.position.x = Math.min(bound, Math.max(-bound, b.position.x));
                        b.position.z = Math.min(bound, Math.max(-bound, b.position.z));
                    }
                }
            }
        }
        
        function initNumbers() {
            numbers.forEach(num => {
                scene.remove(num.mesh);
                if (num.mesh.material) num.mesh.material.dispose();
            });
            numbers = [];
            
            const correctVal = currentQuestion.answer;
            const correctCube = createNumberCube(correctVal);
            correctCube.position.copy(getRandomSpawnPosition(true, playerMesh?.position));
            scene.add(correctCube);
            numbers.push({
                mesh: correctCube,
                value: correctVal,
                isCorrect: true,
                velocity: new THREE.Vector2((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2).normalize().multiplyScalar(NUMBER_BASE_SPEED)
            });
            
            for (let i = 0; i < NUMBERS_COUNT - 1; i++) {
                let val = getRandomValue(correctVal);
                const cube = createNumberCube(val);
                cube.position.copy(getRandomSpawnPosition(true, playerMesh?.position));
                scene.add(cube);
                numbers.push({
                    mesh: cube,
                    value: val,
                    isCorrect: false,
                    velocity: new THREE.Vector2((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2).normalize().multiplyScalar(NUMBER_BASE_SPEED)
                });
            }
            resolveNumberCollisions();
        }
        
        function addOneNumber(isCorrectNeeded = false) {
            let newVal;
            let isCorrect = false;
            if (isCorrectNeeded) {
                newVal = currentQuestion.answer;
                isCorrect = true;
            } else {
                const hasCorrect = numbers.some(n => n.isCorrect);
                if (!hasCorrect) {
                    newVal = currentQuestion.answer;
                    isCorrect = true;
                } else {
                    newVal = getRandomValue(currentQuestion.answer);
                    isCorrect = false;
                }
            }
            const newCube = createNumberCube(newVal);
            newCube.position.copy(getRandomSpawnPosition(true, playerMesh?.position));
            scene.add(newCube);
            const velDir = new THREE.Vector2((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2).normalize();
            numbers.push({
                mesh: newCube,
                value: newVal,
                isCorrect: isCorrect,
                velocity: velDir.multiplyScalar(NUMBER_BASE_SPEED * currentSpeedMult)
            });
            resolveNumberCollisions();
        }
        
        function replaceNumber(collidedNum) {
            const index = numbers.findIndex(n => n.mesh === collidedNum.mesh);
            if (index !== -1) {
                scene.remove(collidedNum.mesh);
                if (collidedNum.mesh.material) collidedNum.mesh.material.dispose();
                numbers.splice(index, 1);
            }
            const needCorrect = collidedNum.isCorrect;
            addOneNumber(needCorrect);
        }
        
        // 正确碰撞处理
        function onCorrectCollision(correctNum) {
            if (!gameActive) return;
            currentScore += 1;
            updateScoreUI();
            
            currentSpeedMult = Math.min(MAX_SPEED_MULT, currentSpeedMult + SPEED_INCREASE_RATE);
            updateSpeedUI();
            
            currentQuestion = generateMathQuestion();
            updateQuestionUI();
            
            replaceNumber(correctNum);
            
            // 更新所有数字速度
            numbers.forEach(num => {
                const len = num.velocity.length();
                if (len > 0) {
                    num.velocity.setLength(NUMBER_BASE_SPEED * currentSpeedMult);
                } else {
                    num.velocity.set((Math.random() - 0.5)*2, (Math.random() - 0.5)*2).normalize().multiplyScalar(NUMBER_BASE_SPEED * currentSpeedMult);
                }
            });
            
            createPlusOneEffect();
            createAuraEffect();
        }
        
        // 错误碰撞 -> 游戏结束
        function onWrongCollision() {
            if (!gameActive) return;
            endGame();  // 直接结束游戏
        }
        
        // 特效
        function createPlusOneEffect() {
            const div = document.createElement('div');
            div.className = 'plus-one';
            div.innerText = '+1';
            div.style.left = (window.innerWidth / 2) + 'px';
            div.style.top = (window.innerHeight / 2 - 40) + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
        }
        
        function createAuraEffect() {
            const ringGeo = new THREE.TorusGeometry(0.9, 0.08, 16, 40);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4411 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.copy(playerMesh.position);
            ring.position.y = 0.2;
            scene.add(ring);
            let scale = 1;
            let duration = 0;
            function animateRing() {
                duration += 0.03;
                scale += 0.1;
                ring.scale.set(scale, scale, scale);
                ring.material.emissiveIntensity = Math.max(0, 1 - duration);
                if (duration < 0.6) {
                    requestAnimationFrame(animateRing);
                } else {
                    scene.remove(ring);
                }
            }
            requestAnimationFrame(animateRing);
        }
        
        function triggerEarthquake() {
            if (cameraOriginalPos === null) cameraOriginalPos = camera.position.clone();
            let intensity = 0.12;
            let duration = 0.2;
            const startTime = performance.now();
            function shake() {
                const elapsed = (performance.now() - startTime) / 1000;
                if (elapsed < duration && gameActive) {
                    const offsetX = (Math.random() - 0.5) * intensity * (1 - elapsed/duration);
                    const offsetY = (Math.random() - 0.5) * intensity * (1 - elapsed/duration);
                    camera.position.x = cameraOriginalPos.x + offsetX;
                    camera.position.y = cameraOriginalPos.y + offsetY;
                    requestAnimationFrame(shake);
                } else {
                    camera.position.copy(cameraOriginalPos);
                }
            }
            shake();
        }
        
        function showRedFlash() {
            const flashDiv = document.createElement('div');
            flashDiv.className = 'red-flash';
            document.body.appendChild(flashDiv);
            setTimeout(() => flashDiv.remove(), 300);
        }
        
        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = currentScore;
        }
        function updateSpeedUI() {
            document.getElementById('speedValue').innerText = currentSpeedMult.toFixed(2);
        }
        
        // 全新飞船建模 (科幻宇宙飞船)
        function createSpaceship() {
            const group = new THREE.Group();
            
            // 主体: 扁椭圆体
            const bodyGeo = new THREE.SphereGeometry(0.55, 32, 32);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a9eff, metalness: 0.85, roughness: 0.25 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.scale.set(1.4, 0.65, 1.2);
            body.position.y = 0;
            group.add(body);
            
            // 驾驶舱 (半球)
            const cockpitGeo = new THREE.SphereGeometry(0.38, 32, 32);
            const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x2266aa, metalness: 0.9 });
            const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
            cockpit.position.set(0, 0.35, 0.45);
            cockpit.scale.set(0.9, 0.7, 0.8);
            group.add(cockpit);
            
            // 机头锥体
            const noseGeo = new THREE.ConeGeometry(0.35, 0.8, 16);
            const noseMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, metalness: 0.7 });
            const nose = new THREE.Mesh(noseGeo, noseMat);
            nose.position.set(0, 0.15, 0.85);
            group.add(nose);
            
            // 主翼 (两侧大翼)
            const wingGeo = new THREE.BoxGeometry(1.5, 0.08, 0.6);
            const wingMat = new THREE.MeshStandardMaterial({ color: 0xcc8844, metalness: 0.6 });
            const leftWing = new THREE.Mesh(wingGeo, wingMat);
            leftWing.position.set(-0.85, 0.1, 0.1);
            leftWing.rotation.z = -0.2;
            group.add(leftWing);
            
            const rightWing = new THREE.Mesh(wingGeo, wingMat);
            rightWing.position.set(0.85, 0.1, 0.1);
            rightWing.rotation.z = 0.2;
            group.add(rightWing);
            
            // 尾翼 (垂直)
            const tailGeo = new THREE.ConeGeometry(0.28, 0.65, 4);
            const tailMat = new THREE.MeshStandardMaterial({ color: 0xcc8844 });
            const tail = new THREE.Mesh(tailGeo, tailMat);
            tail.position.set(0, 0.45, -0.65);
            group.add(tail);
            
            // 引擎喷口 (两个圆环)
            const engineRingGeo = new THREE.TorusGeometry(0.3, 0.08, 16, 32);
            const engineMat = new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff2200 });
            const leftEngine = new THREE.Mesh(engineRingGeo, engineMat);
            leftEngine.position.set(-0.5, -0.1, -0.75);
            leftEngine.rotation.x = Math.PI / 2;
            group.add(leftEngine);
            
            const rightEngine = new THREE.Mesh(engineRingGeo, engineMat);
            rightEngine.position.set(0.5, -0.1, -0.75);
            rightEngine.rotation.x = Math.PI / 2;
            group.add(rightEngine);
            
            // 引擎火焰粒子效果 (点光源)
            const engineLight = new THREE.PointLight(0xff6600, 0.9, 5);
            engineLight.position.set(0, -0.2, -0.85);
            group.add(engineLight);
            
            // 装饰线条
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
            const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.03, 0.9), lineMat);
            stripe.position.set(0, 0.2, 0.2);
            group.add(stripe);
            
            group.castShadow = true;
            group.receiveShadow = false;
            return group;
        }
        
        // 数字移动 (随机 + 碰撞)
        function updateNumbersMovement(deltaTime) {
            const speed = NUMBER_BASE_SPEED * currentSpeedMult * deltaTime;
            for (let num of numbers) {
                num.mesh.position.x += num.velocity.x * deltaTime;
                num.mesh.position.z += num.velocity.y * deltaTime;
                const bound = WORLD_SIZE - NUMBER_RADIUS;
                if (num.mesh.position.x > bound) {
                    num.mesh.position.x = bound - (num.mesh.position.x - bound);
                    num.velocity.x = -num.velocity.x;
                }
                if (num.mesh.position.x < -bound) {
                    num.mesh.position.x = -bound - (num.mesh.position.x + bound);
                    num.velocity.x = -num.velocity.x;
                }
                if (num.mesh.position.z > bound) {
                    num.mesh.position.z = bound - (num.mesh.position.z - bound);
                    num.velocity.y = -num.velocity.y;
                }
                if (num.mesh.position.z < -bound) {
                    num.mesh.position.z = -bound - (num.mesh.position.z + bound);
                    num.velocity.y = -num.velocity.y;
                }
                num.mesh.position.y = Math.sin(Date.now() * 0.005 + num.value) * 0.08;
            }
            
            // 数字间弹性碰撞
            for (let i = 0; i < numbers.length; i++) {
                for (let j = i+1; j < numbers.length; j++) {
                    const a = numbers[i].mesh;
                    const b = numbers[j].mesh;
                    const dx = a.position.x - b.position.x;
                    const dz = a.position.z - b.position.z;
                    const dist = Math.hypot(dx, dz);
                    const minDist = NUMBER_RADIUS * 2;
                    if (dist < minDist) {
                        const angle = Math.atan2(dz, dx);
                        const overlap = minDist - dist;
                        const moveX = Math.cos(angle) * overlap * 0.5;
                        const moveZ = Math.sin(angle) * overlap * 0.5;
                        a.position.x += moveX;
                        a.position.z += moveZ;
                        b.position.x -= moveX;
                        b.position.z -= moveZ;
                        const va = numbers[i].velocity;
                        const vb = numbers[j].velocity;
                        const nx = dx / dist;
                        const nz = dz / dist;
                        const dot = (va.x - vb.x)*nx + (va.y - vb.y)*nz;
                        if (dot < 0) {
                            const imp = 0.8;
                            const v1x = va.x - dot * nx * imp;
                            const v1z = va.y - dot * nz * imp;
                            const v2x = vb.x + dot * nx * imp;
                            const v2z = vb.y + dot * nz * imp;
                            numbers[i].velocity.set(v1x, v1z);
                            numbers[j].velocity.set(v2x, v2z);
                        }
                        const bound = WORLD_SIZE - NUMBER_RADIUS;
                        a.position.x = Math.min(bound, Math.max(-bound, a.position.x));
                        a.position.z = Math.min(bound, Math.max(-bound, a.position.z));
                        b.position.x = Math.min(bound, Math.max(-bound, b.position.x));
                        b.position.z = Math.min(bound, Math.max(-bound, b.position.z));
                    }
                }
            }
        }
        
        function checkCollisions() {
            if (!gameActive) return;
            for (let i = 0; i < numbers.length; i++) {
                const num = numbers[i];
                const dist = playerMesh.position.distanceTo(num.mesh.position);
                if (dist < PLAYER_RADIUS + NUMBER_RADIUS) {
                    if (num.isCorrect) {
                        onCorrectCollision(num);
                    } else {
                        onWrongCollision();  // 错误即结束
                    }
                    break;
                }
            }
        }
        
        function updatePlayerPosition(deltaTime) {
            let moveX = 0, moveZ = 0;
            if (keyState.w || keyState.ArrowUp) moveZ -= 1;
            if (keyState.s || keyState.ArrowDown) moveZ += 1;
            if (keyState.a || keyState.ArrowLeft) moveX -= 1;
            if (keyState.d || keyState.ArrowRight) moveX += 1;
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
            }
            const speed = PLAYER_SPEED * deltaTime;
            let newX = playerMesh.position.x + moveX * speed;
            let newZ = playerMesh.position.z + moveZ * speed;
            const bound = WORLD_SIZE - 0.9;
            newX = Math.min(bound, Math.max(-bound, newX));
            newZ = Math.min(bound, Math.max(-bound, newZ));
            playerMesh.position.x = newX;
            playerMesh.position.z = newZ;
            if (moveX !== 0 || moveZ !== 0) {
                playerMesh.rotation.y = Math.atan2(moveX, moveZ);
            }
        }
        
        // 键盘事件
        function handleKeyDown(e) {
            const key = e.key;
            if (keyState.hasOwnProperty(key)) keyState[key] = true;
            const lower = key.toLowerCase();
            if (lower === 'w') keyState.w = true;
            if (lower === 'a') keyState.a = true;
            if (lower === 's') keyState.s = true;
            if (lower === 'd') keyState.d = true;
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(key)) e.preventDefault();
        }
        function handleKeyUp(e) {
            const key = e.key;
            if (keyState.hasOwnProperty(key)) keyState[key] = false;
            const lower = key.toLowerCase();
            if (lower === 'w') keyState.w = false;
            if (lower === 'a') keyState.a = false;
            if (lower === 's') keyState.s = false;
            if (lower === 'd') keyState.d = false;
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(key)) e.preventDefault();
        }
        
        // 游戏结束和排行榜
        function endGame() {
            if (!gameActive) return;
            gameActive = false;
            if (requestId) cancelAnimationFrame(requestId);
            document.getElementById('game-over-panel').style.display = 'flex';
            document.getElementById('final-score').innerHTML = `得分: ${currentScore}`;
            loadRankFromStorage();
            if (checkIfTopFive(currentScore) && currentScore > 0) {
                document.getElementById('name-input-area').style.display = 'flex';
                const submitBtn = document.getElementById('submit-score');
                const newSubmit = submitBtn.cloneNode(true);
                submitBtn.parentNode.replaceChild(newSubmit, submitBtn);
                newSubmit.addEventListener('click', () => {
                    let name = document.getElementById('player-name').value.trim().toUpperCase().slice(0,3);
                    if (!name) name = "AAA";
                    name = name.replace(/[^A-Z]/g, '');
                    if (!name) name = "AAA";
                    addScoreToRank(name, currentScore);
                    saveRankToStorage();
                    displayRanking();
                    document.getElementById('name-input-area').style.display = 'none';
                });
            } else {
                document.getElementById('name-input-area').style.display = 'none';
            }
            displayRanking();
            const restartBtn = document.getElementById('restart-btn');
            const newRestart = restartBtn.cloneNode(true);
            restartBtn.parentNode.replaceChild(newRestart, restartBtn);
            newRestart.addEventListener('click', () => location.reload());
        }
        
        function loadRankFromStorage() {
            const stored = localStorage.getItem('mathSpaceRank');
            rankData = stored ? JSON.parse(stored) : [];
            rankData.sort((a,b)=>b.score - a.score);
            if (rankData.length > 5) rankData = rankData.slice(0,5);
        }
        function saveRankToStorage() {
            rankData.sort((a,b)=>b.score - a.score);
            if (rankData.length > 5) rankData = rankData.slice(0,5);
            localStorage.setItem('mathSpaceRank', JSON.stringify(rankData));
        }
        function checkIfTopFive(score) {
            if (rankData.length < 5) return true;
            return score > rankData[rankData.length-1].score;
        }
        function addScoreToRank(name, score) {
            rankData.push({ name, score });
            rankData.sort((a,b)=>b.score - a.score);
            if (rankData.length > 5) rankData.pop();
        }
        function displayRanking() {
            const container = document.getElementById('rank-list');
            container.innerHTML = '';
            if (rankData.length === 0) {
                container.innerHTML = '<div class="rank-entry">✨ 暂无记录 ✨</div>';
                return;
            }
            rankData.forEach((e, i) => {
                const div = document.createElement('div');
                div.className = 'rank-entry';
                div.innerHTML = `<span>${i+1}. ${e.name}</span><span>${e.score} 分</span>`;
                container.appendChild(div);
            });
        }
        
        // 场景初始化
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b2a);
            scene.fog = new THREE.FogExp2(0x050b2a, 0.01);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 12);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.0);
            dirLight.position.set(5, 12, 4);
            dirLight.castShadow = true;
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0x4466cc, 0.5);
            fillLight.position.set(-2,4,3);
            scene.add(fillLight);
            const backLight = new THREE.PointLight(0xffaa66,0.4);
            backLight.position.set(0,2,-5);
            scene.add(backLight);
            
            const gridHelper = new THREE.GridHelper(WORLD_SIZE*2, 20, 0x88aaff, 0x335588);
            gridHelper.position.y = -0.6;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.35;
            scene.add(gridHelper);
            
            // 边界指示环 (装饰)
            const boundaryRing = new THREE.LineLoop(
                new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-WORLD_SIZE+0.5, -0.5, -WORLD_SIZE+0.5),
                    new THREE.Vector3( WORLD_SIZE-0.5, -0.5, -WORLD_SIZE+0.5),
                    new THREE.Vector3( WORLD_SIZE-0.5, -0.5,  WORLD_SIZE-0.5),
                    new THREE.Vector3(-WORLD_SIZE+0.5, -0.5,  WORLD_SIZE-0.5)
                ]),
                new THREE.LineBasicMaterial({ color: 0x3399ff })
            );
            scene.add(boundaryRing);
            
            playerMesh = createSpaceship();
            playerMesh.position.set(0,0,0);
            scene.add(playerMesh);
            
            currentQuestion = generateMathQuestion();
            updateQuestionUI();
            initNumbers();
        }
        
        function animate() {
            if (!gameActive) return;
            const delta = Math.min(0.033, clock.getDelta());
            updatePlayerPosition(delta);
            updateNumbersMovement(delta);
            checkCollisions();
            const targetCamPos = new THREE.Vector3(playerMesh.position.x, 7.5, playerMesh.position.z + 10);
            camera.position.lerp(targetCamPos, 0.05);
            camera.lookAt(playerMesh.position);
            renderer.render(scene, camera);
            requestId = requestAnimationFrame(animate);
        }
        
        function startGame() {
            initScene();
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            window.addEventListener('contextmenu', e=>e.preventDefault());
            gameActive = true;
            currentScore = 0;
            currentSpeedMult = 1.0;
            updateScoreUI();
            updateSpeedUI();
            animate();
        }
        
        loadRankFromStorage();
        startGame();
    </script>
</body>
</html>
