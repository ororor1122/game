<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>一笔画 · 指尖挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动时选中文字 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a3c2c 0%, #0e2a1f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            touch-action: pan-y; /* 保留垂直滚动，但canvas内禁止滚动 */
            padding: 16px;
        }

        /* 游戏容器 - 自适应卡片 */
        .game-container {
            background: rgba(255,248,225,0.9);
            border-radius: 56px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,200,0.6);
            padding: 20px 16px 24px;
            width: 100%;
            max-width: 550px;
            transition: all 0.2s ease;
        }

        /* 标题区 */
        .game-header {
            text-align: center;
            margin-bottom: 18px;
        }
        h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #3b5e2b, #1e3a1a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.1);
            font-weight: 800;
        }
        .sub {
            font-size: 0.75rem;
            color: #5a4a2e;
            background: #fef3cf;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* canvas 区域 - 正方形自适应 */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 8px 0 12px;
        }
        canvas {
            background: #fef7e0;
            border-radius: 48px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3), inset 0 0 0 2px rgba(255,245,190,0.8);
            width: 100%;
            height: auto;
            cursor: pointer;
            touch-action: none;  /* 禁止触摸滚动，让canvas完全控制手势 */
        }

        /* 信息面板 */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #e7dbbd;
            padding: 10px 20px;
            border-radius: 60px;
            margin: 12px 8px 18px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.1), 0 3px 6px rgba(0,0,0,0.1);
        }
        .edges-counter {
            background: #2d3e2b;
            padding: 5px 16px;
            border-radius: 40px;
            color: #ffefb9;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .edges-counter span {
            font-size: 1.7rem;
            font-weight: 800;
            color: #f9c35c;
            margin-right: 4px;
        }
        .message {
            background: #5f4c2b;
            color: #fae672;
            padding: 5px 18px;
            border-radius: 32px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            flex: 1;
            margin-left: 12px;
            box-shadow: inset 0 0 2px #ffea9e;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 8px;
            margin-bottom: 6px;
        }
        .btn {
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 12px 28px;
            border-radius: 48px;
            background: #fff0cf;
            color: #2b4a1e;
            box-shadow: 0 5px 0 #ad9e7a;
            transition: 0.07s linear;
            cursor: pointer;
            touch-action: manipulation;
            font-family: inherit;
            letter-spacing: 1px;
            flex: 0 1 auto;
            min-width: 110px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #ad9e7a;
        }
        .btn-reset {
            background: #ffda9e;
            color: #8b5a2b;
        }
        .btn-hint {
            background: #bfd8b8;
            color: #2c5724;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #5c533b;
            margin-top: 18px;
            opacity: 0.7;
        }

        /* 针对超小屏幕调整内边距 */
        @media (max-width: 480px) {
            .game-container {
                padding: 14px 12px 18px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 1rem;
                min-width: 90px;
            }
            .info-panel {
                padding: 6px 12px;
            }
            .edges-counter {
                font-size: 1rem;
                padding: 3px 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>⚡ 一笔画 ⚡</h1>
        <div class="sub">不重复边 · 一气呵成</div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
    </div>

    <div class="info-panel">
        <div class="edges-counter">
            <span id="remainingEdges">5</span> / 5 边
        </div>
        <div class="message" id="statusMsg">
            👆 触摸节点开始
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-reset" id="resetBtn">🔄 重置</button>
        <button class="btn btn-hint" id="hintBtn">💡 提示</button>
    </div>
    <footer>一笔连完所有线段 | 滑动手指连接相邻点</footer>
</div>

<script>
    (function(){
        // ----- 图形定义 (风筝形/钻石形 + 对角线，奇点2个，完美一笔画)
        // 节点使用相对坐标 (0~1 范围)，基于canvas实际尺寸动态映射
        const nodes = [
            { id: 'top',    label: '⬆️', xRatio: 0.5, yRatio: 0.20 },  // 上顶点
            { id: 'left',   label: '⬅️', xRatio: 0.20, yRatio: 0.65 },  // 左点
            { id: 'right',  label: '➡️', xRatio: 0.80, yRatio: 0.65 },  // 右点
            { id: 'bottom', label: '⬇️', xRatio: 0.5, yRatio: 0.85 }    // 下顶点
        ];

        // 边列表: 无向边，存储两端的节点id
        const edgesDef = [
            { id: 'top-left',   from: 'top', to: 'left' },
            { id: 'top-right',  from: 'top', to: 'right' },
            { id: 'left-bottom',from: 'left', to: 'bottom' },
            { id: 'right-bottom',from: 'right', to: 'bottom' },
            { id: 'left-right', from: 'left', to: 'right' }   // 中间对角线
        ];
        const TOTAL_EDGES = edgesDef.length;

        // 辅助: 构建邻接表 (用于快速查找边和验证)
        let edgeMap = new Map(); // key "from-to" 或 "to-from" 存储边的索引
        edgesDef.forEach((edge, idx) => {
            const key1 = `${edge.from}-${edge.to}`;
            const key2 = `${edge.to}-${edge.from}`;
            edgeMap.set(key1, idx);
            edgeMap.set(key2, idx);
        });

        // ----- 游戏状态 -----
        let usedEdges = new Array(TOTAL_EDGES).fill(false);   // true = 已经走过的边
        let currentNodeId = null;          // 当前画笔所在的节点ID (null表示未开始)
        let gameCompleted = false;          // 是否已完成一笔画

        // 画布相关
        const canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        let canvasWidth = 500, canvasHeight = 500;

        // 存储当前实际节点坐标 (每次resize或绘制时更新)
        let nodePositions = new Map(); // id -> {x, y}

        // UI 元素
        const remainingSpan = document.getElementById('remainingEdges');
        const statusDiv = document.getElementById('statusMsg');

        // 触摸交互防重复: 记录上次连接时的时间戳/节点组合，避免在单次滑动中多次连接同一条边
        let lastConnectedEdgeKey = '';
        let touchMoveLock = false;

        // ---------- 辅助函数 ----------
        function updateUI() {
            const usedCount = usedEdges.filter(v => v === true).length;
            const left = TOTAL_EDGES - usedCount;
            remainingSpan.innerText = left;
            if (gameCompleted) {
                statusDiv.innerHTML = '🎉 完美一笔！ 太厉害了 🎉';
                statusDiv.style.background = '#c7b15e';
                statusDiv.style.color = '#2a431d';
            } else {
                if (currentNodeId === null) {
                    statusDiv.innerHTML = '👆 触摸任意节点 开始一笔画';
                } else {
                    const nodeLabel = nodes.find(n => n.id === currentNodeId)?.label || '';
                    statusDiv.innerHTML = `✍️ 当前在 ${nodeLabel}  | 剩余 ${left} 条边`;
                }
                statusDiv.style.background = '#5f4c2b';
                statusDiv.style.color = '#fae672';
            }
        }

        // 计算剩余未走边数，并检查完成
        function checkCompletion() {
            const allUsed = usedEdges.every(v => v === true);
            if (allUsed && TOTAL_EDGES > 0 && !gameCompleted) {
                gameCompleted = true;
                updateUI();
                drawCanvas(); // 重新绘制，弹出胜利氛围
                // 轻提示震动（可选，手机支持）
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(200);
                }
            } else if (!allUsed && gameCompleted) {
                gameCompleted = false;
                updateUI();
                drawCanvas();
            } else {
                updateUI();
            }
        }

        // 重置游戏 (清空所有走过的边，清除当前节点)
        function resetGame() {
            usedEdges.fill(false);
            currentNodeId = null;
            gameCompleted = false;
            lastConnectedEdgeKey = '';
            touchMoveLock = false;
            updateUI();
            drawCanvas();
            // 重置提示: 移除额外高亮
        }

        // 尝试连接两个节点 (从fromNode 到 toNode)
        // 返回值: 是否成功连接并移动
        function tryConnect(fromId, toId) {
            if (gameCompleted) {
                statusDiv.innerHTML = '🏆 已完成！点重置继续挑战 🏆';
                return false;
            }
            if (!fromId || !toId) return false;
            if (fromId === toId) return false;

            // 查找边是否存在
            const key1 = `${fromId}-${toId}`;
            const key2 = `${toId}-${fromId}`;
            let edgeIndex = -1;
            if (edgeMap.has(key1)) edgeIndex = edgeMap.get(key1);
            else if (edgeMap.has(key2)) edgeIndex = edgeMap.get(key2);
            
            if (edgeIndex === -1) {
                // 不存在边，非法连接
                return false;
            }
            // 边是否已经走过
            if (usedEdges[edgeIndex]) {
                // 这条边已经走过，不可重复
                return false;
            }

            // 关键规则：一笔画连续性，必须从当前节点出发
            // 如果currentNodeId 为null，说明还没开始，允许从fromId开始（首次连接）
            if (currentNodeId === null) {
                // 首次连接: 当前所在的节点设为fromId，然后走向toId
                currentNodeId = fromId;
                // 然后再进行连接 from -> to
                return performConnection(fromId, toId, edgeIndex);
            } else {
                // 已有当前节点，必须 current == fromId 才能走向 toId
                if (currentNodeId === fromId) {
                    return performConnection(fromId, toId, edgeIndex);
                } 
                // 如果当前节点是 toId 且用户反方向滑动，允许反向连接 (从当前节点 toId 到 fromId)
                else if (currentNodeId === toId) {
                    return performConnection(toId, fromId, edgeIndex);
                }
                else {
                    // 非相邻或起点不符，不允许连接
                    return false;
                }
            }
        }

        // 执行实际连接动作: 从 a 到 b，边索引为 eIdx
        function performConnection(aId, bId, eIdx) {
            if (usedEdges[eIdx]) return false;
            // 标记边为走过
            usedEdges[eIdx] = true;
            // 更新当前节点为终点
            currentNodeId = bId;
            // 重绘
            drawCanvas();
            checkCompletion();
            // 震动轻反馈 (可选)
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(30);
            }
            return true;
        }

        // ----- 绘图核心 (自适应尺寸)-----
        function updateNodePositions() {
            nodePositions.clear();
            for (let node of nodes) {
                const x = node.xRatio * canvasWidth;
                const y = node.yRatio * canvasHeight;
                nodePositions.set(node.id, { x, y, label: node.label });
            }
        }

        function drawCanvas() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            // 绘制背景网格装饰 (极淡线)
            ctx.save();
            ctx.strokeStyle = "#ddd0ae";
            ctx.lineWidth = 1.2;
            for (let i = 0; i < canvasWidth; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvasHeight);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvasWidth, i);
                ctx.stroke();
            }
            
            // 1. 绘制所有未走过的边 (浅灰色虚线或实线)
            for (let idx = 0; idx < edgesDef.length; idx++) {
                const edge = edgesDef[idx];
                const fromPos = nodePositions.get(edge.from);
                const toPos = nodePositions.get(edge.to);
                if (!fromPos || !toPos) continue;
                
                ctx.beginPath();
                ctx.moveTo(fromPos.x, fromPos.y);
                ctx.lineTo(toPos.x, toPos.y);
                if (usedEdges[idx]) {
                    // 已走过的边: 金色华丽粗线 + 发光
                    ctx.strokeStyle = "#e5b83c";
                    ctx.lineWidth = 6;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = "#ffcd6b";
                } else {
                    // 未走过的边: 木质深色虚线感
                    ctx.strokeStyle = "#ac9a6e";
                    ctx.lineWidth = 3.5;
                    ctx.setLineDash([8, 6]);
                    ctx.shadowBlur = 0;
                }
                ctx.stroke();
                ctx.setLineDash([]); // 重置实线
            }
            ctx.shadowBlur = 0;
            
            // 2. 绘制节点 (立体圆球)
            for (let node of nodes) {
                const pos = nodePositions.get(node.id);
                if (!pos) continue;
                // 外光晕
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 18, 0, Math.PI*2);
                ctx.fillStyle = "#fdf8ed";
                ctx.shadowBlur = 6;
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.fill();
                ctx.shadowBlur = 0;
                // 内圈
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 14, 0, Math.PI*2);
                let gradient = ctx.createRadialGradient(pos.x-4, pos.y-4, 5, pos.x, pos.y, 18);
                gradient.addColorStop(0, '#ffe2a4');
                gradient.addColorStop(1, '#e0b070');
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = "#b47c48";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                // 高亮当前节点
                if (currentNodeId === node.id && !gameCompleted) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 24, 0, Math.PI*2);
                    ctx.strokeStyle = "#ffb347";
                    ctx.lineWidth = 4;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = "#ffcc77";
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    // 加内光晕
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 16, 0, Math.PI*2);
                    ctx.fillStyle = "#ffdd99";
                    ctx.fill();
                }
                // 节点小图标文字
                ctx.font = `bold ${Math.floor(canvasWidth * 0.045)}px "Segoe UI Emoji"`;
                ctx.fillStyle = "#5a3e1f";
                ctx.shadowBlur = 0;
                ctx.fillText(node.label, pos.x-11, pos.y+9);
            }
            
            // 如果游戏完成，绘制庆祝粒子效果（简单飘带风格）
            if (gameCompleted) {
                ctx.font = `bold ${Math.floor(canvasWidth * 0.07)}px system-ui`;
                ctx.fillStyle = "#d4af37";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ffc107";
                ctx.fillText("✓", canvasWidth-45, 55);
                ctx.fillText("⭐", 25, 65);
                ctx.font = `bold ${Math.floor(canvasWidth * 0.045)}px system-ui`;
                ctx.fillStyle = "#c4912b";
                ctx.fillText("完成一笔画", canvasWidth/2-70, 45);
                ctx.shadowBlur = 0;
            }
        }
        
        // ---------- 触摸事件 (手机核心)----------
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasWidth / rect.width;   // canvas实际像素宽度 / CSS显示宽度
            const scaleY = canvasHeight / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvasWidth);
            canvasY = Math.min(Math.max(0, canvasY), canvasHeight);
            return { x: canvasX, y: canvasY };
        }
        
        // 查找最近的节点 (阈值半径 动态，最小25px)
        function findNearestNode(touchX, touchY) {
            let minDist = 38; // 触摸容差(px)
            let nearestId = null;
            for (let node of nodes) {
                const pos = nodePositions.get(node.id);
                if (!pos) continue;
                const dx = pos.x - touchX;
                const dy = pos.y - touchY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < minDist) {
                    minDist = dist;
                    nearestId = node.id;
                }
            }
            return nearestId;
        }
        
        let touchStartNode = null;       // 起始触摸节点 (用于开始一笔画或者新连接)
        let isDragging = false;
        
        function onTouchStart(e) {
            e.preventDefault();
            if (gameCompleted) return;
            const { x, y } = getCanvasCoords(e);
            const nodeId = findNearestNode(x, y);
            if (!nodeId) return;
            touchStartNode = nodeId;
            isDragging = true;
            lastConnectedEdgeKey = '';
            // 如果当前没有激活的节点，则轻触后高亮但不立即连接，等待移动连接
            if (currentNodeId === null) {
                // 还没有开始，暂存起始点，但未连接任何边，等待滑动到邻点才连
                // 显示提示，但不自动占用边
                currentNodeId = nodeId;  // 先设置当前节点，但未走任何边
                drawCanvas();
                updateUI();
            }
        }
        
        function onTouchMove(e) {
            e.preventDefault();
            if (gameCompleted) return;
            if (!isDragging) return;
            const { x, y } = getCanvasCoords(e);
            const targetNode = findNearestNode(x, y);
            if (!targetNode) return;
            // 当前有效的出发点: 如果currentNodeId存在就用它，否则用touchStartNode
            let fromNode = currentNodeId;
            if (fromNode === null && touchStartNode) {
                fromNode = touchStartNode;
            }
            if (!fromNode) return;
            if (targetNode === fromNode) return;
            
            // 防抖: 避免同一对节点在单次move中重复连接
            const edgeKey = `${fromNode}-${targetNode}`;
            if (lastConnectedEdgeKey === edgeKey) return;
            
            // 尝试连接
            const success = tryConnect(fromNode, targetNode);
            if (success) {
                lastConnectedEdgeKey = edgeKey;
                // 连接成功后touchStartNode同步为最新的当前节点，方便连续滑动
                touchStartNode = currentNodeId;
                // 轻微触感已在tryConnect里震动
            } else {
                // 非法连接时短暂视觉提示 (不更新)
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(20);
                // 闪一下红色反馈
                ctx.save();
                ctx.fillStyle = "rgba(200,70,50,0.3)";
                ctx.fillRect(0,0,canvasWidth,canvasHeight);
                setTimeout(() => drawCanvas(), 60);
            }
        }
        
        function onTouchEnd(e) {
            e.preventDefault();
            isDragging = false;
            touchStartNode = null;
            lastConnectedEdgeKey = '';
            // 额外：如果当前节点仍然为null但游戏未开始，什么都不做
            drawCanvas();
            // 如果游戏完成时保留胜利样式
            if (!gameCompleted && currentNodeId === null && usedEdges.every(v=>!v)) {
                // 完全重置未开始，无额外动作
            }
        }
        
        // ----- 提示功能：找到第一条未走过的边，并高亮其两个节点 (不自动连接，只是提示方向)
        function giveHint() {
            if (gameCompleted) {
                statusDiv.innerHTML = '🎯 已完成！点击重置开始新对局';
                return;
            }
            // 寻找未走过的边中，与当前节点相连的优先推荐
            let hintEdgeIndex = -1;
            let hintFrom = null, hintTo = null;
            if (currentNodeId !== null) {
                // 优先推荐从当前节点出发的未走过边
                for (let i = 0; i < edgesDef.length; i++) {
                    if (usedEdges[i]) continue;
                    const edge = edgesDef[i];
                    if (edge.from === currentNodeId || edge.to === currentNodeId) {
                        hintEdgeIndex = i;
                        hintFrom = currentNodeId;
                        hintTo = (edge.from === currentNodeId) ? edge.to : edge.from;
                        break;
                    }
                }
            }
            // 如果当前节点为null或者没有相连未走边，随便找一条未走过的边
            if (hintEdgeIndex === -1) {
                for (let i = 0; i < edgesDef.length; i++) {
                    if (!usedEdges[i]) {
                        hintEdgeIndex = i;
                        const edge = edgesDef[i];
                        hintFrom = edge.from;
                        hintTo = edge.to;
                        break;
                    }
                }
            }
            if (hintEdgeIndex === -1) {
                statusDiv.innerHTML = '✨ 所有边都已走完，点击重置 ✨';
                return;
            }
            // 高亮提示: 闪烁提示两个节点 (绘制外圈)
            const fromPos = nodePositions.get(hintFrom);
            const toPos = nodePositions.get(hintTo);
            if (fromPos && toPos) {
                drawCanvas(); // 重绘原样
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(fromPos.x, fromPos.y, 28, 0, Math.PI*2);
                ctx.fillStyle = "#ffcc66aa";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(toPos.x, toPos.y, 28, 0, Math.PI*2);
                ctx.fill();
                // 绘制虚线引导
                ctx.beginPath();
                ctx.moveTo(fromPos.x, fromPos.y);
                ctx.lineTo(toPos.x, toPos.y);
                ctx.strokeStyle = "#ffaa33";
                ctx.lineWidth = 5;
                ctx.setLineDash([12, 10]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
                statusDiv.innerHTML = `💡 尝试连接 ${hintFrom} → ${hintTo}`;
                setTimeout(() => drawCanvas(), 900);
            } else {
                drawCanvas();
            }
        }
        
        // ----- 尺寸自适应 (适配所有手机)-----
        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(container.clientWidth, window.innerWidth - 40);
            // 设置 canvas CSS宽高为正方形(宽高相等)
            canvas.style.width = `${maxWidth}px`;
            canvas.style.height = `${maxWidth}px`;
            // 实际像素尺寸 (保证清晰)
            const realSize = maxWidth * window.devicePixelRatio || maxWidth;
            // 但为了触摸坐标映射准确，canvas.width使用实际CSS逻辑像素(和屏幕适配保持一致映射简单)
            // 为了避免模糊和坐标错位，让canvas.width/height等于CSS的像素大小（保证1:1映射）
            canvas.width = maxWidth;
            canvas.height = maxWidth;
            canvasWidth = maxWidth;
            canvasHeight = maxWidth;
            // 更新节点坐标
            updateNodePositions();
            drawCanvas();
        }
        
        // 窗口变化重新布局
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 30);
        });
        
        // 初始化canvas及事件绑定
        function init() {
            resizeCanvas();
            // 绑定触摸事件，禁用鼠标事件干扰（移动端优先）
            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchmove', onTouchMove, { passive: false });
            canvas.addEventListener('touchend', onTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', onTouchEnd);
            // 按钮事件
            document.getElementById('resetBtn').addEventListener('click', () => {
                resetGame();
                drawCanvas();
            });
            document.getElementById('hintBtn').addEventListener('click', () => {
                giveHint();
            });
            resetGame(); // 初始状态
            drawCanvas();
        }
        
        init();
    })();
</script>
</body>
</html>
