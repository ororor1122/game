<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>七月的肖邦 - 周杰伦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#0a0a12;color:#fff;
  min-height:100vh;min-height:100dvh;overflow-x:hidden}

/* Album Hero */
.album-hero{position:relative;min-height:62vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;
  background:linear-gradient(160deg,#1a0a2e 0%,#0d1a35 40%,#1a1035 100%)}
.album-glow{position:absolute;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,#c9a84c22 0%,transparent 70%);
  animation:glowPulse 4s ease-in-out infinite}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.1);opacity:1}}
.album-cover{position:relative;z-index:2;width:clamp(180px,48vw,260px);
  aspect-ratio:1;background:linear-gradient(145deg,#2a1a40,#1a0a2e);
  border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(201,168,76,.15);
  overflow:hidden}
.album-cover::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,.15) 0%,transparent 60%);
  border-radius:12px}
.cover-disc{font-size:clamp(64px,18vw,96px);line-height:1;margin-bottom:8px}
.cover-title{font-size:clamp(16px,4.5vw,22px);font-weight:bold;color:#c9a84c;
  text-shadow:0 0 20px rgba(201,168,76,.5);text-align:center;z-index:1;position:relative}
.cover-sub{font-size:clamp(11px,3vw,14px);color:#c9a84c88;margin-top:4px;z-index:1;position:relative}
.album-info{position:relative;z-index:2;text-align:center;margin-top:24px;padding:0 20px}
.album-name{font-size:clamp(22px,6vw,32px);font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,#f0d080,#c9a84c);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.artist-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.artist-label{font-size:12px;color:#6a6080;padding:3px 10px;border:1px solid #6a6080;border-radius:20px}
.year-label{font-size:12px;color:#6a6080}
.album-year{font-size:12px;color:#4a4060}

/* Progress */
.progress-area{padding:16px 24px 0;display:flex;align-items:center;gap:10px}
.cur-time{font-size:11px;color:#6a6080;min-width:36px;text-align:center}
.pro-track{flex:1;height:3px;background:#ffffff15;border-radius:3px;position:relative;cursor:pointer}
.pro-fill{height:100%;background:linear-gradient(to right,#c9a84c,#f0d080);
  border-radius:3px;width:0%;transition:width .3s;position:relative}
.pro-fill::after{content:'';position:absolute;right:-5px;top:-4px;
  width:11px;height:11px;background:#c9a84c;border-radius:50%;
  box-shadow:0 0 6px rgba(201,168,76,.8)}
.pro-total{font-size:11px;color:#6a6080;min-width:36px;text-align:center}

/* Controls */
.ctrl-row{padding:16px 24px 0;display:flex;align-items:center;justify-content:center;gap:clamp(20px,6vw,36px)}
.ctrl-btn{display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;color:#c9a84c;
  transition:transform .15s,opacity .15s}
.ctrl-btn:active{transform:scale(.88)}
.ctrl-lg{width:clamp(64px,18vw,80px);height:clamp(64px,18vw,80px);
  background:linear-gradient(145deg,#c9a84c,#8a6a20);
  border-radius:50%;box-shadow:0 4px 20px rgba(201,168,76,.35);
  font-size:clamp(28px,8vw,38px);color:#0a0a12}
.ctrl-lg:active{box-shadow:0 2px 10px rgba(201,168,76,.25)}
.ctrl-sm{font-size:clamp(22px,6vw,30px);color:#8880a0}
.ctrl-sm.on{color:#c9a84c;text-shadow:0 0 10px rgba(201,168,76,.6)}

/* Track List */
.track-section{margin-top:28px;padding:0 16px}
.section-head{display:flex;align-items:center;justify-content:space-between;
  padding:0 8px 10px;border-bottom:1px solid #ffffff10}
.section-head .title{font-size:13px;color:#c9a84c;font-weight:600;letter-spacing:1px}
.section-head .count{font-size:12px;color:#4a4060}
.track-list{display:flex;flex-direction:column;padding:0}
.track-item{display:flex;align-items:center;padding:13px 8px;border-radius:10px;
  transition:background .15s;position:relative}
.track-item:active{background:#ffffff08}
.track-item.playing{background:linear-gradient(90deg,#c9a84c15,transparent)}
.track-item.playing .t-num{color:#c9a84c}
.track-item.playing .t-name{color:#f0d080}
.t-num{font-size:12px;color:#3a3050;min-width:28px;text-align:center;font-weight:600}
.t-num.on{color:#c9a84c}
.t-name{flex:1;font-size:14px;color:#ccc0e0;padding:0 10px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.t-name.on{color:#f0d080;font-weight:600}
.t-dur{font-size:11px;color:#4a4060;min-width:40px;text-align:right}
.t-badge{display:none;width:6px;height:6px;background:#c9a84c;border-radius:50%;
  margin-right:4px;vertical-align:middle;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.track-item.playing .t-badge{display:inline-block}

/* Volume */
.vol-row{padding:8px 24px 4px;display:flex;align-items:center;gap:10px}
.vol-icon{font-size:16px;color:#6a6080;cursor:pointer}
.vol-bar{flex:1;height:3px;background:#ffffff15;border-radius:3px;position:relative;cursor:pointer}
.vol-fill{height:100%;background:#c9a84c;border-radius:3px;width:70%}

/* Footer */
.footer{padding:24px 20px 40px;text-align:center}
.footer p{font-size:11px;color:#3a3050;line-height:2}

/* Loading */
.loading{position:fixed;inset:0;background:#0a0a12;
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;
  transition:opacity .5s}
.loading.out{opacity:0;pointer-events:none}
.load-ico{font-size:64px;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:14px;color:#6a6080;margin-top:16px;letter-spacing:2px}
.load-txt span{display:inline-block;animation:dot 1.4s infinite}
.load-txt span:nth-child(2){animation-delay:.2s}
.load-txt span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:0}40%{opacity:1}}

/* Mini player bar */
.mini-bar{display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,10,18,.96);border-top:1px solid #ffffff10;
  padding:10px 16px;z-index:50;backdrop-filter:blur(10px);
  align-items:center;gap:10px}
.mini-bar.on{display:flex}
.mini-cover{font-size:28px;flex-shrink:0}
.mini-info{flex:1;overflow:hidden}
.mini-name{font-size:13px;color:#f0d080;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-artist{font-size:11px;color:#6a6080}
.mini-ctrl{font-size:24px;background:none;border:none;color:#c9a84c;cursor:pointer;padding:4px}
.mini-ctrl:active{transform:scale(.88)}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="load-ico">&#128190;</div>
  <div class="load-txt">加载中<span>.</span><span>.</span><span>.</span></div>
</div>

<!-- Album -->
<div class="album-hero">
  <div class="album-glow"></div>
  <div class="album-cover">
    <div class="cover-disc">&#127925;</div>
    <div class="cover-title">七月的肖邦</div>
    <div class="cover-sub">Jay Chou</div>
  </div>
  <div class="album-info">
    <div class="album-name">七月的肖邦</div>
    <div class="artist-row">
      <span class="artist-label">周杰伦</span>
      <span class="year-label">·</span>
      <span class="album-year">2005年7月1日</span>
    </div>
  </div>
</div>

<!-- Progress -->
<div class="progress-area" id="progressArea">
  <span class="cur-time" id="curTime">0:00</span>
  <div class="pro-track" id="proTrack">
    <div class="pro-fill" id="proFill"></div>
  </div>
  <span class="pro-total" id="proTotal">0:00</span>
</div>

<!-- Controls -->
<div class="ctrl-row">
  <button class="ctrl-btn ctrl-sm" id="shuffleBtn" onclick="toggleShuffle()">&#128256;</button>
  <button class="ctrl-btn ctrl-lg" id="playBtn" onclick="togglePlay()">&#9658;</button>
  <button class="ctrl-btn ctrl-sm" id="nextBtn" onclick="nextTrack()">&#9654;&#9654;</button>
  <button class="ctrl-btn ctrl-sm" id="loopBtn" onclick="toggleLoop()">&#128257;</button>
</div>

<!-- Volume -->
<div class="vol-row">
  <span class="vol-icon" id="volIcon">&#128266;</span>
  <div class="vol-bar" id="volBar">
    <div class="vol-fill" id="volFill" style="width:70%"></div>
  </div>
</div>

<!-- Mini Bar -->
<div class="mini-bar" id="miniBar">
  <div class="mini-cover">&#127925;</div>
  <div class="mini-info">
    <div class="mini-name" id="miniName">选择歌曲</div>
    <div class="mini-artist">周杰伦</div>
  </div>
  <button class="mini-ctrl" onclick="togglePlay()">&#9658;</button>
</div>

<!-- Track List -->
<div class="track-section">
  <div class="section-head">
    <span class="title">曲目列表</span>
    <span class="count">共12首</span>
  </div>
  <div class="track-list" id="trackList"></div>
</div>

<!-- Footer -->
<div class="footer">
  <p>《七月的肖邦》是周杰伦第七张国语专辑<br>2005年7月1日发行</p>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
(function(){
'use strict';

// ─── Tracks ─────────────────────────────────────────────
const TRACKS = [
  {n:1,  t:'蓝色风暴',         d:'4:03'},
  {n:2,  t:'浪漫手机',         d:'3:42'},
  {n:3,  t:'逆鳞',             d:'4:05'},
  {n:4,  t:'麦芽糖',           d:'4:10'},
  {n:5,  t:'逆鳞 (Interlude)', d:'0:42'},
  {n:6,  t:'枫',               d:'4:28'},
  {n:7,  t:'彩虹',             d:'4:31'},
  {n:8,  t:'糖醋排骨',         d:'4:22'},
  {n:9,  t:'珊瑚海',           d:'4:16'},
  {n:10, t:'飘移',             d:'3:28'},
  {n:11, t:'麦芽糖 (Remix)',   d:'4:08'},
  {n:12, t:'逆鳞 (Original)',   d:'4:02'},
];

// Note: 本页面为展示型播放器，不含实际音频文件
// 如需播放，请将音乐文件上传至网盘或服务器，
// 并将下方的 AUDIO_BASE 替换为实际URL前缀

const AUDIO_BASE = ''; // 例如: 'https://your-cdn.com/jay-chou/'

// ─── State ─────────────────────────────────────────────
let state = {
  current: -1,
  playing: false,
  shuffle: false,
  loop: false,   // 0=none, 1=loop-all, 2=loop-one
  volume: 0.7,
  muted: false,
};
let shuffled = [];

// ─── DOM refs ───────────────────────────────────────────
const audio    = document.getElementById('audio');
const playBtn  = document.getElementById('playBtn');
const curTime  = document.getElementById('curTime');
const proFill  = document.getElementById('proFill');
const proTotal = document.getElementById('proTotal');
const proTrack = document.getElementById('proTrack');
const volFill  = document.getElementById('volFill');
const volBar   = document.getElementById('volBar');
const volIcon  = document.getElementById('volIcon');
const shuffleEl= document.getElementById('shuffleBtn');
const loopEl   = document.getElementById('loopBtn');
const miniBar  = document.getElementById('miniBar');
const miniName = document.getElementById('miniName');
const trackList= document.getElementById('trackList');
const loading  = document.getElementById('loading');

// ─── Format time ───────────────────────────────────────
function fmt(s){
  if(isNaN(s)||s<0) return '0:00';
  return Math.floor(s/60)+':'+(''+(Math.floor(s%60))).padStart(2,'0');
}

// ─── Render track list ──────────────────────────────────
function renderTracks(){
  let html='';
  TRACKS.forEach((tr,i)=>{
    const isCurrent = i===state.current;
    html+=`<div class="track-item${isCurrent?' playing':''}" onclick="playTrack(${i})" id="tr${i}">
      <span class="t-num${isCurrent?' on':''}" id="tn${i}">
        ${isCurrent&&state.playing?'&#9654;':tr.n}
      </span>
      <span class="t-badge"></span>
      <span class="t-name${isCurrent?' on':''}" id="tx${i}">${tr.t}</span>
      <span class="t-dur">${tr.d}</span>
    </div>`;
  });
  trackList.innerHTML=html;
}

// ─── Play a track ──────────────────────────────────────
function playTrack(idx){
  if(idx<0||idx>=TRACKS.length) return;
  state.current=idx;
  const tr=TRACKS[idx];
  const src = AUDIO_BASE ? AUDIO_BASE+encodeURIComponent(tr.t+'.mp3') : '';
  audio.src=src;
  miniName.textContent=tr.t+' - '+tr.t+' (Demo)';
  if(AUDIO_BASE) audio.play().catch(()=>{});
  state.playing=!!AUDIO_BASE;
  updateUI();
}

// ─── Update UI ─────────────────────────────────────────
function updateUI(){
  const i=state.current;
  const playing=state.playing;
  const tr=i>=0?TRACKS[i]:null;

  playBtn.innerHTML=playing?'&#9208;':'&#9658;';
  miniBar.className='mini-bar'+(i>=0?' on':'');

  if(i>=0){
    const items=document.querySelectorAll('.track-item');
    items.forEach((el,idx)=>{
      const is=idx===i;
      el.className='track-item'+(is?' playing':'');
      const nm=document.getElementById('tn'+idx);
      if(nm){ nm.className='t-num'+(is?' on':''); nm.textContent=is&&playing?'&#9654;':TRACKS[idx].n; }
      const tx=document.getElementById('tx'+idx);
      if(tx){ tx.className='t-name'+(is?' on':''); }
    });
  }
}

// ─── Toggle play/pause ─────────────────────────────────
function togglePlay(){
  if(state.current<0){ playTrack(0); return; }
  if(AUDIO_BASE){
    if(state.playing){ audio.pause(); state.playing=false; }
    else{ audio.play().catch(()=>{}); state.playing=true; }
  } else {
    state.playing=!state.playing;
    if(state.playing) state.playing=false; // no audio, just UI
  }
  updateUI();
}

// ─── Prev / Next ───────────────────────────────────────
function nextTrack(){
  let next;
  if(state.shuffle){
    const pool=[];
    for(let j=0;j<TRACKS.length;j++) if(j!==state.current) pool.push(j);
    next=pool[Math.floor(Math.random()*pool.length)];
  } else {
    next=(state.current+1)%TRACKS.length;
  }
  playTrack(next);
}

function prevTrack(){
  if(state.current<0){ playTrack(TRACKS.length-1); return; }
  const prev=(state.current-1+TRACKS.length)%TRACKS.length;
  playTrack(prev);
}

// ─── Shuffle / Loop ────────────────────────────────────
function toggleShuffle(){
  state.shuffle=!state.shuffle;
  shuffleEl.style.color=state.shuffle?'#c9a84c':'#8880a0';
  shuffleEl.style.textShadow=state.shuffle?'0 0 10px rgba(201,168,76,.6)':'none';
}

function toggleLoop(){
  state.loop=(state.loop+1)%3;
  const icons=['&#128257;','&#128257;','&#127829;'];
  const colors=['#8880a0','#c9a84c','#c9a84c'];
  const shadows=['','0 0 10px rgba(201,168,76,.6)','0 0 10px rgba(201,168,76,.6)'];
  loopEl.innerHTML=icons[state.loop];
  loopEl.style.color=colors[state.loop];
  loopEl.style.textShadow=shadows[state.loop];
}

// ─── Progress bar click ─────────────────────────────────
proTrack.addEventListener('click',e=>{
  if(!AUDIO_BASE||!audio.duration) return;
  const rect=proTrack.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  audio.currentTime=pct*audio.duration;
});

volBar.addEventListener('click',e=>{
  const rect=volBar.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  volFill.style.width=(pct*100)+'%';
  audio.volume=pct;
  state.volume=pct;
  updateVolIcon();
});

// ─── Audio events ───────────────────────────────────────
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  const pct=(audio.currentTime/audio.duration)*100;
  proFill.style.width=pct+'%';
  curTime.textContent=fmt(audio.currentTime);
  proTotal.textContent=fmt(audio.duration);
});

audio.addEventListener('ended',()=>{
  if(state.loop===2){ audio.currentTime=0; audio.play().catch(()=>{}); }
  else if(state.loop===1){ nextTrack(); }
  else if(state.current<TRACKS.length-1){ nextTrack(); }
  else { state.playing=false; updateUI(); }
});

audio.addEventListener('loadedmetadata',()=>{
  proTotal.textContent=fmt(audio.duration);
});

// ─── Volume ─────────────────────────────────────────────
function updateVolIcon(){
  const v=audio.muted?0:audio.volume;
  volIcon.innerHTML=v===0?'&#128263;':v<.5?'&#128266;':'&#128266;';
  volFill.style.width=(v*100)+'%';
}

volIcon.addEventListener('click',()=>{
  audio.muted=!audio.muted;
  updateVolIcon();
});

audio.volume=state.volume;
audio.muted=false;

// ─── Keyboard ───────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='k'){e.preventDefault();togglePlay();}
  if(e.key==='ArrowRight'||e.key==='n') nextTrack();
  if(e.key==='ArrowLeft'||e.key==='p') prevTrack();
});

// ─── Init ───────────────────────────────────────────────
renderTracks();
updateVolIcon();

setTimeout(()=>{
  loading.classList.add('out');
  setTimeout(()=>loading.style.display='none',500);
},800);

// Auto-play first track on tap
document.addEventListener('click',function handler(){
  if(state.current<0) playTrack(0);
  this.removeEventListener('click',handler);
},{once:true});

})();
</script>
</body>
</html>
